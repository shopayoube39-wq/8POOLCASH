<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8PoolCash | العب واربح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .gold-text { color: #FFD369; text-shadow: 0 0 20px rgba(255, 211, 105, 0.2); }
        .gold-button { background: linear-gradient(180deg, #FFD369 0%, #B8860B 100%); box-shadow: 0 4px 25px rgba(184, 134, 11, 0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .gold-button:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); box-shadow: 0 10px 30px rgba(184, 134, 11, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; backdrop-filter: blur(8px); transition: 0.4s ease; }
        .glass-card:hover { border-color: rgba(255, 211, 105, 0.4); background: rgba(255, 255, 255, 0.06); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .pool-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .ball { position: absolute; border-radius: 50%; opacity: 0.2; filter: blur(1px); animation: float linear infinite; }
        @keyframes float { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(100vw, 100vh) rotate(360deg); } }
        .glow-ball-effect { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 211, 105, 0.15) 0%, transparent 70%); filter: blur(40px); }
        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.03; pointer-events: none; z-index: 50; }
        .money-green { color: #2ecc71; text-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="pool-bg" id="ballContainer"></div>

    <header class="p-8 flex justify-between items-center max-w-7xl mx-auto relative z-10">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.2)]"><span class="text-black font-black text-2xl">8</span></div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">8Pool<span class="gold-text">Cash</span></h1>
        </div>
        <button onclick="location.href='W/auth.html'" class="gold-button text-black px-10 py-3 rounded-full font-black text-sm uppercase tracking-widest">ابدأ الآن</button>
    </header>

    <main class="relative z-10 pt-20 px-6 text-center max-w-5xl mx-auto">
        <div class="inline-block px-6 py-2 bg-yellow-500/5 border border-yellow-500/20 rounded-full mb-8 text-[11px] font-black gold-text uppercase tracking-[4px]">لاعبون نشطون الآن ⚡</div>
        <h1 class="text-6xl md:text-[7rem] font-black mb-10 leading-[0.9] italic">العب البلياردو <br> <span class="gold-text">واربح المال</span></h1>
        <p class="text-gray-400 text-xl md:text-2xl mb-16 max-w-2xl mx-auto leading-relaxed font-light">تحدى منافساً حقيقياً في لعبة 8 كرات بلياردو. <br> كل لاعب يراهن بـ <span class="text-white font-bold">$10</span> والفائز يحصل على <span class="gold-text font-bold">$20</span> كاملة!</p>
        <button onclick="location.href='W/auth.html'" class="gold-button text-black w-full md:w-auto px-20 py-6 rounded-2xl font-black text-3xl mb-24">سجل وابدأ التحدي</button>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-40">
            <div class="glass-card p-12"><div class="text-6xl font-black gold-text mb-3 tracking-tighter counter" data-target="10000">+0</div><div class="text-gray-500 text-[10px] font-black uppercase tracking-[3px]">لاعب نشط</div></div>
            <div class="glass-card p-12 scale-110 border-yellow-500/20 bg-white/5"><div class="text-6xl font-black money-green mb-3 tracking-tighter">$<span class="counter" data-target="500">0</span>K</div><div class="text-gray-500 text-[10px] font-black uppercase tracking-[3px]">أرباح مدفوعة</div></div>
            <div class="glass-card p-12"><div class="text-6xl font-black text-blue-500 mb-3 tracking-tighter"><span class="counter" data-target="98">0</span>%</div><div class="text-gray-500 text-[10px] font-black uppercase tracking-[3px]">رضا اللاعبين</div></div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
            authDomain: "poolcash-6692c.firebaseapp.com",
            databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
            projectId: "poolcash-6692c",
            storageBucket: "poolcash-6692c.firebasestorage.app",
            messagingSenderId: "866544389541",
            appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
        };
        firebase.initializeApp(firebaseConfig);

        // سكربت الأنيميشن والعدادات
        const container = document.getElementById('ballContainer');
        const colors = ['#FFD369', '#3B82F6', '#EF4444', '#FFFFFF', '#10B981'];
        for (let i = 0; i < 25; i++) {
            const ball = document.createElement('div');
            ball.className = 'ball';
            const size = Math.random() * 30 + 10 + 'px';
            ball.style.width = size; ball.style.height = size;
            ball.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            ball.style.left = Math.random() * 100 + 'vw'; ball.style.top = Math.random() * 100 + 'vh';
            ball.style.animationDuration = Math.random() * 25 + 20 + 's';
            ball.style.animationDelay = '-' + Math.random() * 20 + 's';
            container.appendChild(ball);
        }

        const counters = document.querySelectorAll('.counter');
        const speed = 200;
        const startCounters = () => {
            counters.forEach(counter => {
                const updateCount = () => {
                    const target = +counter.getAttribute('data-target');
                    const count = +counter.innerText.replace('+', '').replace('$', '').replace('%', '');
                    const inc = target / speed;
                    if (count < target) {
                        const nextVal = Math.ceil(count + inc);
                        if (counter.parentElement.innerText.includes('+')) counter.innerText = '+' + nextVal.toLocaleString();
                        else counter.innerText = nextVal;
                        setTimeout(updateCount, 1);
                    } else {
                        if (counter.parentElement.innerText.includes('+')) counter.innerText = '+' + target.toLocaleString();
                        else counter.innerText = target;
                    }
                };
                updateCount();
            });
        };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) { startCounters(); observer.unobserve(entry.target); } });
        }, { threshold: 0.5 });
        document.querySelectorAll('.grid').forEach(grid => observer.observe(grid));
    </script>
</body>
</html>
