<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plinko Cyber Casino - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Space+Grotesk:wght@500;700&display=swap');
        
        body {
            font-family: 'Tajawal', 'Space Grotesk', sans-serif;
            background: radial-gradient(circle at center, #0c061f 0%, #020107 100%);
            overflow-x: hidden;
        }
        
        canvas {
            max-width: 100%;
            height: auto !important;
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
        }

        .neon-container {
            position: relative;
            border-radius: 1.7rem;
            background: linear-gradient(135deg, #00f2fe, #f355da, #ff007f);
            background-size: 300% 300%;
            animation: neonFlow 4s ease infinite;
            padding: 4px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
        }

        @keyframes neonFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .neon-text-cyan {
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020107; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-3 md:p-6 select-none">

    <header class="max-w-7xl w-full mx-auto flex justify-between items-center bg-black/60 p-4 rounded-2xl border border-violet-500/10 backdrop-blur-2xl mb-6 shadow-2xl gap-2">
        <div class="flex items-center gap-2.5 min-w-0">
            <div class="p-2 bg-gradient-to-br from-cyan-400 to-indigo-600 rounded-xl shrink-0">
                <svg class="w-5 h-5 text-black" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 10-1.414 1.414l.707.707zM5 10a1 1 0 11-2 0V9a1 1 0 112 0v1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.657 15.657a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM16 10a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
            </div>
            <div class="flex flex-col min-w-0">
                <span class="text-xl md:text-2xl font-black tracking-widest bg-gradient-to-r from-cyan-400 via-pink-500 to-amber-400 bg-clip-text text-transparent neon-text-cyan font-mono truncate">CYBER PLINKO</span>
            </div>
        </div>
        
        <div class="flex items-center bg-slate-950/80 px-4 py-2 rounded-xl border border-cyan-500/20 shadow-lg shrink-0">
            <div class="text-left font-mono">
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-wider text-right">SOLDE / الرصيد</p>
                <p class="text-cyan-400 font-black text-base md:text-xl tracking-wide whitespace-nowrap flex items-center justify-end gap-1">
                    <span id="balance">1000.00</span>
                    <span class="text-xs md:text-sm text-cyan-500/80">$</span>
                </p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6 flex-grow items-start">
        
        <section class="bg-black/70 p-5 rounded-2xl border border-white/5 backdrop-blur-2xl lg:h-[650px] flex flex-col justify-between shadow-2xl order-2 lg:order-1">
            <div class="space-y-6">
                <div class="flex justify-between items-center pb-3 border-b border-white/10">
                    <h2 class="font-black text-xs text-cyan-400 uppercase tracking-wider">Mise & Configuration / التحكم والرهان</h2>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-gray-400 text-xs font-bold">Montant du Pari / قيمة الرهان</label>
                        <span class="text-[10px] text-gray-500 font-mono">USD ($)</span>
                    </div>
                    <div class="flex bg-slate-950 rounded-xl p-2 border border-white/5">
                        <input id="bet-amount" type="number" value="100" min="1" class="w-full bg-transparent px-3 py-1.5 text-white outline-none font-black text-lg text-left tracking-widest font-mono" dir="ltr">
                        <button onclick="adjustBet(0.5)" class="px-3 text-sm text-gray-400 hover:text-cyan-400 transition font-mono font-bold">½</button>
                        <button onclick="adjustBet(2)" class="px-3 text-sm text-gray-400 hover:text-pink-500 border-r border-white/10 transition font-mono font-bold">2X</button>
                    </div>
                </div>

                <button id="play-btn" onclick="dropBall()" class="w-full bg-gradient-to-r from-pink-500 via-purple-600 to-cyan-500 text-white font-black py-4 rounded-xl shadow-lg active:scale-[0.96] transition duration-200 text-lg tracking-wider flex flex-col items-center justify-center gap-0.5">
                    <span class="font-bold tracking-widest text-base">LANCER LA BILLE 🔥</span>
                    <span class="text-xs font-medium opacity-80">إسقاط الكرة</span>
                </button>
            </div>

            <div class="mt-6">
                <h3 class="text-gray-400 text-[11px] mb-3 font-bold uppercase tracking-wider">📊 Historique Récents / سجل الجولات</h3>
                <div id="history-container" class="flex flex-wrap gap-2 max-h-[140px] overflow-y-auto content-start dir-ltr"></div>
            </div>
        </section>

        <section class="lg:col-span-2 order-1 lg:order-2">
            <div class="neon-container">
                <div id="canvas-container" class="w-full relative flex justify-center bg-[#020308] rounded-2xl overflow-hidden"></div>
            </div>
        </section>

        <section class="bg-black/40 p-4 rounded-2xl border border-white/5 backdrop-blur-2xl lg:h-[650px] flex flex-col order-3 shadow-2xl">
            <div class="flex items-center gap-2 pb-3 border-b border-white/10 mb-3">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                </span>
                <div class="flex flex-col">
                    <h3 class="text-emerald-400 font-black text-xs tracking-wider uppercase font-mono">PARIS EN DIRECT 🌐</h3>
                    <span class="text-[9px] text-gray-400 font-bold">مراقبة الرهانات الحية</span>
                </div>
            </div>
            <div id="live-players-list" class="space-y-2.5 overflow-hidden flex-grow flex flex-col justify-start"></div>
        </section>

    </main>

    <script>
        let balance = 1000;
        const canvasWidth = 600;
        const canvasHeight = 610;
        const rows = 13; 

        const bucketConfigs = [
            { mult: 10,  widthPct: 0.03, color: '#10b981' }, 
            { mult: 5,   widthPct: 0.04, color: '#10b981' }, 
            { mult: 3,   widthPct: 0.05, color: '#a855f7' }, 
            { mult: 1.2, widthPct: 0.06, color: '#f59e0b' }, 
            { mult: 0.2, widthPct: 0.10, color: '#ef4444' }, 
            { mult: 0.1, widthPct: 0.18, color: '#ef4444' }, 
            { mult: 0.0, widthPct: 0.28, color: '#ef4444' }, 
            { mult: 0.1, widthPct: 0.18, color: '#ef4444' }, 
            { mult: 0.2, widthPct: 0.10, color: '#ef4444' }, 
            { mult: 1.2, widthPct: 0.06, color: '#f59e0b' }, 
            { mult: 3,   widthPct: 0.05, color: '#a855f7' }, 
            { mult: 5,   widthPct: 0.04, color: '#10b981' }, 
            { mult: 10,  widthPct: 0.03, color: '#10b981' }  
        ];

        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create({ gravity: { y: 1.8 } }); 
        const world = engine.world;

        const container = document.getElementById('canvas-container');
        const render = Render.create({
            element: container, engine: engine,
            options: { width: canvasWidth, height: canvasHeight, wireframes: false, background: '#020308' }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const pins = [];
        const startY = 60;
        const spacing = 39; 

        for (let i = 0; i < rows; i++) {
            const count = i + 3; 
            const rowWidth = (count - 1) * spacing;
            const startX = (canvasWidth - rowWidth) / 2;

            for (let j = 0; j < count; j++) {
                const x = startX + j * spacing;
                const y = startY + i * spacing;
                const pin = Bodies.circle(x, y, 4, {
                    isStatic: true,
                    label: 'pin',
                    render: { fillStyle: '#00f2fe' }
                });
                pins.push(pin);
            }
        }
        Composite.add(world, pins);

        const buckets = [];
        let currentX = 0;

        for (let i = 0; i < bucketConfigs.length; i++) {
            const config = bucketConfigs[i];
            const bWidth = canvasWidth * config.widthPct;
            const xCenter = currentX + bWidth / 2;

            if (i > 0) {
                const divider = Bodies.rectangle(currentX, canvasHeight - 30, 2, 60, {
                    isStatic: true, render: { fillStyle: '#110c29' }
                });
                Composite.add(world, divider);
            }

            const sensor = Bodies.rectangle(xCenter, canvasHeight - 20, bWidth - 2, 35, {
                isStatic: true, isSensor: true, label: `bucket-${i}`,
                render: { fillStyle: 'transparent' }
            });
            
            config.xStart = currentX;
            config.width = bWidth;
            config.xCenter = xCenter;
            
            buckets.push(sensor);
            currentX += bWidth;
        }
        Composite.add(world, buckets);

        let activeBucket = null;
        let activeBucketTimer = 0;

        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            ctx.font = 'bold 11px Tajawal, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = 0; i < bucketConfigs.length; i++) {
                const config = bucketConfigs[i];

                let alpha = '22'; 
                if (activeBucket === i && activeBucketTimer > 0) { alpha = 'aa'; activeBucketTimer--; }

                ctx.fillStyle = config.color + alpha;
                ctx.fillRect(config.xStart + 1.5, canvasHeight - 50, config.width - 3, 45);
                ctx.strokeStyle = config.color;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(config.xStart + 1.5, canvasHeight - 50, config.width - 3, 45);

                ctx.fillStyle = config.color;
                ctx.fillText(`${config.mult}x`, config.xCenter, canvasHeight - 28);
            }
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol = 0.1) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA.label === 'ball' || pair.bodyB.label === 'ball') {
                    const pin = pair.bodyA.label === 'pin' ? pair.bodyA : (pair.bodyB.label === 'pin' ? pair.bodyB : null);
                    if (pin) {
                        pin.render.fillStyle = '#ff007f';
                        setTimeout(() => { pin.render.fillStyle = '#00f2fe'; }, 80);
                        playSound(550 + Math.random() * 400, 'sine', 0.04, 0.05);
                    }
                }
            });
        });

        function adjustBet(factor) {
            const betInput = document.getElementById('bet-amount');
            let currentBet = parseFloat(betInput.value);
            if (factor === 0.5) currentBet = Math.max(10, Math.floor(currentBet / 2));
            if (factor === 2) currentBet = Math.min(balance, currentBet * 2);
            betInput.value = currentBet;
        }

        function dropBall() {
            const betInput = document.getElementById('bet-amount');
            const betAmount = parseFloat(betInput.value);

            if (isNaN(betAmount) || betAmount <= 0 || betAmount > balance) {
                alert('Solde insuffisante / رصيد غير كافٍ'); return;
            }

            balance -= betAmount;
            updateBalanceUI();

            const randomOffset = (Math.random() - 0.5) * 1.5; 
            const ball = Bodies.circle(canvasWidth / 2 + randomOffset, 15, 8, {
                restitution: 0.35, 
                friction: 0.06,
                label: 'ball',
                render: { fillStyle: '#ff007f' }
            });
            ball.customData = { betAmount, isFake: false };

            Composite.add(world, ball);
            playSound(320, 'triangle', 0.1, 0.08);
        }

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const bodyA = pair.bodyA; const bodyB = pair.bodyB;
                let ball = null; let sensor = null;

                if (bodyA.label === 'ball' && bodyB.label.startsWith('bucket-')) { ball = bodyA; sensor = bodyB; }
                else if (bodyB.label === 'ball' && bodyA.label.startsWith('bucket-')) { ball = bodyB; sensor = bodyA; }

                if (ball && sensor) {
                    const bucketIndex = parseInt(sensor.label.split('-')[1]);
                    const config = bucketConfigs[bucketIndex];
                    
                    activeBucket = bucketIndex;
                    activeBucketTimer = 12;

                    if (!ball.customData.isFake) {
                        const payout = ball.customData.betAmount * config.mult;
                        balance += payout;
                        updateBalanceUI();
                        addToHistory(config.mult);
                        
                        if(config.mult >= 3) {
                            playSound(523.25, 'sine', 0.2, 0.2);
                        } else if(config.mult >= 1) {
                            playSound(330, 'sine', 0.15, 0.1);
                        } else {
                            playSound(110, 'sawtooth', 0.2, 0.15);
                        }
                    }
                    Composite.remove(world, ball);
                }
            });
        });

        function updateBalanceUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
        }

        function addToHistory(mult) {
            const container = document.getElementById('history-container');
            let colorClass = 'bg-red-500/20 text-red-400 border-red-500/40';
            if (mult === 1.2) colorClass = 'bg-yellow-500/20 text-yellow-400 border-yellow-500/40';
            if (mult >= 3) colorClass = 'bg-emerald-500/20 text-emerald-400 border-emerald-500/40';

            const badge = document.createElement('span');
            badge.className = `text-xs font-black px-3 py-1 rounded-xl border ${colorClass} font-mono`;
            badge.innerText = `${mult}x`;
            container.insertBefore(badge, container.firstChild);
            if (container.children.length > 10) container.removeChild(container.lastChild);
        }

        const fakeNames = [
            "Alpha_Trader", "CryptoKing", "Shadow_Bet", "Matrix_VIP", "Hyper_Drive", 
            "Neon_Ghost", "Golden_Boy", "Cyber_Whale", "Infinity_Win", "Blaze_99",
            "Delta_Max", "Pixel_Hunter", "Vortex_Bet", "Rocket_Man", "Sonic_BOOM",
            "Titan_Strike", "Omega_Rider", "Quantum_Cash", "Phoenix_UP", "Apex_Predator"
        ];

        function generateFakeBet() {
            const list = document.getElementById('live-players-list');
            const randomName = fakeNames[Math.floor(Math.random() * fakeNames.length)];
            const randomBet = (Math.random() * 250 + 10).toFixed(0);
            
            let bucketIndex;
            const rand = Math.random();
            
            if (rand < 0.80) {
                const winIndices = [0, 1, 2, 3, 9, 10, 11, 12];
                bucketIndex = winIndices[Math.floor(Math.random() * winIndices.length)];
            } else {
                const loseIndices = [4, 5, 6, 7, 8];
                bucketIndex = loseIndices[Math.floor(Math.random() * loseIndices.length)];
            }

            const config = bucketConfigs[bucketIndex];
            const profit = (randomBet * config.mult).toFixed(1);

            let cardStyle = "";
            let textClass = "";
            let statusLabel = "";
            
            if (config.mult >= 3) {
                cardStyle = "background: linear-gradient(90deg, rgba(16,185,129,0.15) 0%, rgba(2,3,8,0.6) 100%); border-color: rgba(16,185,129,0.4);";
                textClass = "text-emerald-400 font-black";
                statusLabel = "<span class='text-[9px] text-emerald-400 font-bold px-1.5 py-0.5 bg-emerald-500/10 rounded uppercase font-mono'>WIN</span>";
            } else if (config.mult === 1.2) {
                cardStyle = "background: linear-gradient(90deg, rgba(245,158,11,0.15) 0%, rgba(2,3,8,0.6) 100%); border-color: rgba(245,158,11,0.4);";
                textClass = "text-yellow-400 font-black";
                statusLabel = "<span class='text-[9px] text-yellow-400 font-bold px-1.5 py-0.5 bg-yellow-500/10 rounded uppercase font-mono'>STAY</span>";
            } else {
                cardStyle = "background: linear-gradient(90deg, rgba(239,68,68,0.1) 0%, rgba(2,3,8,0.6) 100%); border-color: rgba(239,68,68,0.25);";
                textClass = "text-red-400 font-bold";
                statusLabel = "<span class='text-[9px] text-red-400 font-bold px-1.5 py-0.5 bg-red-500/10 rounded uppercase font-mono'>LOSS</span>";
            }

            const item = document.createElement('div');
            item.className = 'flex justify-between items-center border p-2.5 rounded-xl text-xs backdrop-blur-md shadow-lg transition duration-300';
            item.style = cardStyle;
            item.innerHTML = `
                <div class="flex flex-col gap-0.5">
                    <div class="flex items-center gap-1.5">
                        <span class="text-gray-200 font-bold font-mono tracking-wide">${randomName}</span>
                        ${statusLabel}
                    </div>
                    <span class="text-[10px] text-gray-400 font-medium font-mono">Mise (الرهان): ${randomBet} $</span>
                </div>
                <div class="text-left flex flex-col items-end font-mono">
                    <span class="${textClass} text-sm">${config.mult}x</span>
                    <span class="text-[10px] text-gray-300 font-bold">${config.mult >= 1 ? '+' : ''}${profit} $</span>
                </div>
            `;

            if(Math.random() > 0.5) {
                const fakeBall = Bodies.circle(canvasWidth / 2 + (Math.random() - 0.5) * 6, 15, 7, {
                    restitution: 0.32, friction: 0.08, label: 'ball',
                    render: { fillStyle: config.color, opacity: 0.2 } 
                });
                fakeBall.customData = { isFake: true };
                Composite.add(world, fakeBall);
            }

            list.insertBefore(item, list.firstChild);
            if (list.children.length > 7) list.removeChild(list.lastChild);
        }
        setInterval(generateFakeBet, 1200); 
    </script>
</body>
</html>
