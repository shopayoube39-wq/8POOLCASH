            appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const currentUsername = localStorage.getItem('username') || "Ayoube"; 
        let balance = 0;
        let isSpinning = false;
        let currentRotation = 0; // حل مشكلة توقف الدوران في المرة الثانية بالاحتفاظ بقيمة الزاوية التراكمية

        let pendingBetAmount = parseFloat(localStorage.getItem('pendingBet')) || 150;
        document.getElementById('betAmount').value = pendingBetAmount;

        database.ref('users/' + currentUsername + '/balance').on('value', (snapshot) => {
            if (!isSpinning) {
                balance = parseFloat(snapshot.val()) || 0;
                document.getElementById('balance').innerText = balance.toLocaleString();
            }
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'tick') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
                } else if (type === 'win') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                } else if (type === 'lose') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.45);
                }
            } catch(e) { console.log(e); }
        }

        const rouletteNumbers = [
            { num: 0, color: 'zero' }, { num: 32, color: 'red' }, { num: 15, color: 'black' },
            { num: 19, color: 'red' }, { num: 4, color: 'black' }, { num: 21, color: 'red' },
            { num: 2, color: 'black' }, { num: 25, color: 'red' }, { num: 17, color: 'black' },
            { num: 34, color: 'red' }, { num: 6, color: 'black' }, { num: 27, color: 'red' },
            { num: 13, color: 'black' }, { num: 36, color: 'red' }, { num: 11, color: 'black' },
            { num: 30, color: 'red' }, { num: 8, color: 'black' }, { num: 23, color: 'red' },
            { num: 10, color: 'black' }, { num: 5, color: 'red' }, { num: 24, color: 'black' },
            { num: 16, color: 'red' }, { num: 33, color: 'black' }, { num: 1, color: 'red' },
            { num: 20, color: 'black' }, { num: 14, color: 'red' }, { num: 31, color: 'black' },
            { num: 9, color: 'red' }, { num: 22, color: 'black' }, { num: 18, color: 'red' },
            { num: 29, color: 'black' }, { num: 7, color: 'red' }, { num: 28, color: 'black' },
            { num: 12, color: 'red' }, { num: 35, color: 'black' }, { num: 3, color: 'red' },
            { num: 26, color: 'black' }
        ];

        let currentBet = { type: null, value: null }; 
        const totalNumbers = rouletteNumbers.length;
        const degreesPerSector = 360 / totalNumbers;

        const wheel = document.getElementById('wheel');
        const wheelNumbersContainer = document.getElementById('wheelNumbers');
        
        let conicGradientString = "conic-gradient(";
        rouletteNumbers.forEach((item, index) => {
            const startAngle = index * degreesPerSector;
            const endAngle = (index + 1) * degreesPerSector;
            let colorHex = item.color === 'red' ? '#ff4757' : (item.color === 'black' ? '#1e222b' : '#05c46b');
            conicGradientString += `${colorHex} ${startAngle}deg ${endAngle}deg${index < totalNumbers - 1 ? ',' : ''}`;
            
            const numLabel = document.createElement('div');
            numLabel.className = 'wheel-num-label';
            numLabel.innerText = item.num;
            numLabel.style.transform = `rotate(${startAngle}deg)`; 
            wheelNumbersContainer.appendChild(numLabel);
        });
        wheel.style.background = conicGradientString + ")";

        const numbersGrid = document.getElementById('numbersGrid');
        [...rouletteNumbers].sort((a, b) => a.num - b.num).forEach(item => {
            const btn = document.createElement('button');
            btn.innerText = item.num;
            btn.className = `num-btn ${item.color === 'red' ? 'btn-red' : (item.color === 'black' ? 'btn-black' : 'btn-zero')}`;
            btn.id = `num-${item.num}`;
            btn.onclick = () => selectBet('number', item.num);
            numbersGrid.appendChild(btn);
        });

        function selectBet(type, value) {
            if (isSpinning) return;
            playSound('tick');
            currentBet.type = type; currentBet.value = value;
            document.querySelectorAll('.bet-btn, .num-btn').forEach(b => b.classList.remove('active'));
            if(type === 'number') { 
                document.getElementById(`num-${value}`).classList.add('active'); 
                document.getElementById('currentBetType').innerText = `Numéro : ${value}`; 
            } else { 
                document.getElementById(`bet-${value}`).classList.add('active'); 
                document.getElementById('currentBetType').innerText = value === 'red' ? 'Rouge' : 'Noir'; 
            }
        }

        function updateHistory(winningItem) {
            const container = document.getElementById('historyContainer');
            const item = document.createElement('div');
            item.className = `history-item ${winningItem.color === 'red' ? 'btn-red' : (winningItem.color === 'black' ? 'btn-black' : 'btn-zero')}`;
            item.innerText = winningItem.num;
            container.insertBefore(item, container.firstChild);
            if (container.children.length > 9) { container.removeChild(container.lastChild); }
        }

        function changeLedState(state) {
            const l = document.getElementById('ledLeft');
            const r = document.getElementById('ledRight');
            l.className = 'led-strip led-left';
            r.className = 'led-strip led-right';
            if (state === 'spin') { l.classList.add('led-spin'); r.classList.add('led-spin'); }
            else if (state === 'win') { l.classList.add('led-win'); r.classList.add('led-win'); }
            else if (state === 'lose') { l.classList.add('led-lose'); r.classList.add('led-lose'); }
            else { l.classList.add('led-idle'); r.classList.add('led-idle'); }
        }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confetti = [];
        let animationFrameId;

        function resizeCanvas() {
            canvas.width = document.getElementById('mainContainer').offsetWidth;
            canvas.height = document.getElementById('mainContainer').offsetHeight;
        }

        function createConfetti() {
            confetti = [];
            for (let i = 0; i < 80; i++) {
                confetti.push({
                    x: canvas.width / 2,
                    y: canvas.height / 3,
                    size: Math.random() * 6 + 4,
                    color: `hsl(${Math.random() * 50 + 40}, 100%, 50%)`, 
                    speedX: (Math.random() - 0.5) * 8,
                    speedY: (Math.random() - 0.7) * 10,
                    gravity: 0.25,
                    opacity: 1
                });
            }
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            confetti.forEach(p => {
                if (p.opacity > 0) {
                    alive = true;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.opacity;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.speedY += p.gravity;
                    p.opacity -= 0.015;
                }
            });
            if (alive) { animationFrameId = requestAnimationFrame(drawConfetti); }
            else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        }

        function triggerWinAnimation() {
            resizeCanvas();
            createConfetti();
            cancelAnimationFrame(animationFrameId);
            drawConfetti();
            const box = document.getElementById('balanceBox');
            box.classList.add('pulse');
            setTimeout(() => box.classList.remove('pulse'), 500);
        }

        // دالة إعادة اللعب لتنظيف الواجهة وتصفير الخيارات
        function resetGame() {
            if (isSpinning) return;
            currentBet = { type: null, value: null };
            document.querySelectorAll('.bet-btn, .num-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('currentBetType').innerText = "Aucun pari sélectionné";
            document.getElementById('resultDisplay').innerText = "Faites vos jeux ! Choisissez une option et lanceز.";
            changeLedState('idle');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            playSound('tick');
        }

        function spinWheel() {
            const betAmount = parseFloat(document.getElementById('betAmount').value);
            if (!currentBet.type) { alert('Veuillez sélectionner une mise !'); return; }
            if (isNaN(betAmount) || betAmount > balance) { alert('Solde insuffisant !'); return; }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('resetBtn').disabled = true;
            changeLedState('spin');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let newBalanceAfterBet = balance - betAmount;
            balance = newBalanceAfterBet; 
            document.getElementById('balance').innerText = balance.toLocaleString();
            database.ref('users/' + currentUsername).update({ balance: newBalanceAfterBet });

            // خوارزمية ذكية لتوجيه النتيجة بنسبة 75% للربح لتبدو طبيعية وغير مكشوفة بالفيديو
            let winning;
            let randomIndex;
            const shouldWin = Math.random() < 0.75; 

            if (shouldWin) {
                let winningOptions = [];
                if (currentBet.type === 'number') {
                    winningOptions = rouletteNumbers.filter(item => item.num === currentBet.value);
                } else if (currentBet.type === 'red') {
                    winningOptions = rouletteNumbers.filter(item => item.color === 'red');
                } else if (currentBet.type === 'black') {
                    winningOptions = rouletteNumbers.filter(item => item.color === 'black');
                }
                
                if (winningOptions.length > 0) {
                    const matchItem = winningOptions[Math.floor(Math.random() * winningOptions.length)];
                    randomIndex = rouletteNumbers.findIndex(item => item.num === matchItem.num);
                } else {
                    randomIndex = Math.floor(Math.random() * rouletteNumbers.length);
                }
            } else {
                let losingOptions = [];
                if (currentBet.type === 'number') {
                    losingOptions = rouletteNumbers.filter(item => item.num !== currentBet.value);
                } else if (currentBet.type === 'red') {
                    losingOptions = rouletteNumbers.filter(item => item.color !== 'red');
                } else if (currentBet.type === 'black') {
                    losingOptions = rouletteNumbers.filter(item => item.color !== 'black');
                }
                
                if (losingOptions.length > 0) {
                    const nonMatchItem = losingOptions[Math.floor(Math.random() * losingOptions.length)];
                    randomIndex = rouletteNumbers.findIndex(item => item.num === nonMatchItem.num);
                } else {
                    randomIndex = Math.floor(Math.random() * rouletteNumbers.length);
                }
            }

            winning = rouletteNumbers[randomIndex];
            const spinDuration = 5000; 

            // حساب الزاوية بشكل تراكمي صحيح لحل مشكلة عدم الدوران في المرة الثانية
            const extraRotations = 8 * 360; 
            const sectorAngle = (360 - (randomIndex * degreesPerSector)) % 360;
            
            // إضافة التدوير الجديد فوق التدوير القديم لضمان استمرارية الحركة في كل المرات
            currentRotation = currentRotation + extraRotations + (sectorAngle - (currentRotation % 360));
            
            wheel.style.transition = `transform ${spinDuration}ms cubic-bezier(0.1, 0.8, 0.1, 1)`;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            let startTimestamp = null;
            let lastTickAngle = 0;
            
            function step(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let progress = timestamp - startTimestamp;
                
                if (progress < spinDuration) {
                    let t = progress / spinDuration;
                    let easeOut = 1 - Math.pow(1 - t, 3); 
                    let currentAngle = easeOut * currentRotation;
                    
                    if (currentAngle - lastTickAngle >= degreesPerSector) {
                        playSound('tick');
                        lastTickAngle = currentAngle;
                    }
                    requestAnimationFrame(step);
                }
            }
            requestAnimationFrame(step);

            setTimeout(() => {
                let won = false; 
                let prize = 0;
                
                // تطبيق قانون الربح والخسارة بشكل دقيق 
                if (currentBet.type === 'number' && currentBet.value === winning.num) { 
                    won = true; 
                    prize = betAmount * 35; 
                } else if (currentBet.type === 'red' && winning.color === 'red') { 
                    won = true; 
                    prize = betAmount * 2; 
                } else if (currentBet.type === 'black' && winning.color === 'black') { 
                    won = true; 
                    prize = betAmount * 2; 
                }

                const colorText = winning.color === 'red' ? 'Rouge' : winning.color === 'black' ? 'Noir' : 'Zéro';
                document.getElementById('resultDisplay').innerHTML = `Gagnant : <span style="color:var(--gold); font-size:18px; margin:0 5px;">★ ${winning.num} ★</span> (${colorText})`;
                updateHistory(winning);

                if (won) {
                    let finalBalance = balance + prize;
                    balance = finalBalance;
                    document.getElementById('balance').innerText = balance.toLocaleString();
                    database.ref('users/' + currentUsername).update({ balance: finalBalance });
                    
                    changeLedState('win');
                    playSound('win');
                    triggerWinAnimation();
                    setTimeout(() => alert(`🎉 Incroyable ! Vous avez gagné ${prize} DH`), 150);
                } else {
                    changeLedState('lose');
                    playSound('lose');
                    setTimeout(() => alert(`❌ Désolé, vous avez perdu. Try again!`), 150);
                }
                
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                document.getElementById('resetBtn').disabled = false;
                
                setTimeout(() => { 
                    if(!isSpinning) { changeLedState('idle'); }
                }, 1200);

            }, spinDuration);
        }
    </script>
</body>
