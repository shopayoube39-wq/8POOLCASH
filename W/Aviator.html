        .custom-scrollbar::-webkit-scrollbar { width: 2px; }

        let audioCtx = null; let isAudioInitialized = false; let isMuted = true; let musicBpmLoop = null;
        function initAudio() { if (isAudioInitialized) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isAudioInitialized = true; }
        function playSynthSound(freq, type, duration, vol = 0.06) {
            if (isMuted || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }
        function startCasinoMusicLoop() {
            if (musicBpmLoop) clearInterval(musicBpmLoop);
            let idx = 0; const notes = [90, 110, 120, 130, 90, 110, 150, 130];
            musicBpmLoop = setInterval(() => {
                if (isMuted) return;
                let pitch = 1 + (gameConfig.buildingFloors.length * 0.09);
                playSynthSound(notes[idx % notes.length] * pitch, 'sawtooth', 0.2, 0.02);
                if (idx % 2 === 0) playSynthSound(8000, 'sine', 0.01, 0.005);
                idx++;
            }, 240);
        }
        const sfx = {
            drop: () => playSynthSound(320, 'sine', 0.08, 0.08),
            hit: () => { playSynthSound(220, 'triangle', 0.1, 0.12); playSynthSound(450, 'sine', 0.05, 0.06); },
            cashout: () => { playSynthSound(587, 'sine', 0.05, 0.1); setTimeout(() => playSynthSound(880, 'sine', 0.15, 0.12), 60); },
            lose: () => { playSynthSound(80, 'sawtooth', 0.4, 0.2); }
        };
        function toggleAudioSystem() {
            initAudio(); isMuted = !isMuted;
            document.getElementById('audio-icon').innerText = isMuted ? '🔇' : '🔊';
            if (!isMuted) startCasinoMusicLoop(); else if (musicBpmLoop) clearInterval(musicBpmLoop);
        }
    </script>

    <script>
        let gameConfig = {
            balance: 0,
            buildingFloors: [],
            gameState: 'idle', 
            currentBet: parseFloat(localStorage.getItem('pendingBet')) || 100,
            currentRunningMultiplier: 0.0,
            floorMultipliers: [0.15, 0.35, 0.60, 0.90, 1.15, 1.40, 1.75, 2.10, 2.50, 3.00, 3.60, 4.20]
        };

        database.ref('users/' + username + '/balance').on('value', (snap) => {
            gameConfig.balance = snap.val() || 0;
            document.getElementById('balance-display').innerText = gameConfig.balance.toFixed(2);
        });

        function updateBalanceInFirebase(newBalance) {
            database.ref('users/' + username).update({ balance: newBalance });
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let viewWidth = 0, viewHeight = 0;

        let crane = { x: 220, y: 35, dir: 1, baseSpeed: 4.8, speed: 4.8, angle: 0, maxAngle: 0.25, angleDir: 1 };
        let currentDropPiece = null;
        let particles = [];
        let cameraYOffset = 0;
        let targetCameraYOffset = 0;
        let screenShakeTime = 0;
        
        const initialWidth = 130;
        const floorHeight = 38; 

        const fakeNames = ["Player1", "User2", "ProGamer", "LuckyOne", "TowerKing", "MaxBet", "Speedy", "Elite", "Winner", "Alpha"];
        let livePlayersData = [];

        window.addEventListener('resize', resizeViewport);
        window.addEventListener('load', () => { 
            document.getElementById('bet-amount-field').value = gameConfig.currentBet;
            resizeViewport(); 
            initFakePlayers();
            setInterval(updateFakePlayersLive, 1400); 
            requestAnimationFrame(updateAndRender); 
        });

        function resizeViewport() {
            viewWidth = canvas.width = canvas.clientWidth;
            viewHeight = canvas.height = canvas.clientHeight;
        }

        function handleMainButtonAction() {
            if (gameConfig.gameState === 'idle' || gameConfig.gameState === 'active_round') {
                triggerDropFloorLogic();
            }
        }

        function triggerDropFloorLogic() {
            if(gameConfig.gameState === 'fail_anim' || gameConfig.gameState === 'dropping') return;

            if(gameConfig.gameState === 'idle') {
                initAudio();
                const betAmount = gameConfig.currentBet;

                if(betAmount <= 0 || betAmount > gameConfig.balance) {
                    alert('Solde insuffisant pour miser !');
                    return;
                }

                gameConfig.balance -= betAmount;
                updateBalanceInFirebase(gameConfig.balance);
                gameConfig.gameState = 'dropping';
                
                if (!isMuted) startCasinoMusicLoop();
            } else if (gameConfig.gameState === 'active_round') {
                gameConfig.gameState = 'dropping';
            }

            sfx.drop();

            let targetWidth = initialWidth;
            if (gameConfig.buildingFloors.length > 0) {
                targetWidth = gameConfig.buildingFloors[gameConfig.buildingFloors.length - 1].w;
            }

            let hookX = crane.x + Math.sin(crane.angle) * 35;
            let hookY = crane.y + 35;

            currentDropPiece = {
                x: hookX,
                y: hookY,
                w: targetWidth,
                h: floorHeight,
                speedY: 13.0 + (gameConfig.buildingFloors.length * 0.7) 
            };
            
            updateButtonInterface();
        }

        function updateButtonInterface() {
            const container = document.getElementById('action-buttons-container');
            
            if (gameConfig.gameState === 'idle' || gameConfig.gameState === 'dropping') {
                container.innerHTML = `<button id="main-game-btn" onclick="handleMainButtonAction()" class="w-full btn-state-drop text-white font-black text-base h-12 rounded-xl flex items-center justify-center gap-2 active:scale-[0.99] transition-all">🏗️ DÉPOSER ÉTAGE / DROP</button>`;
            } 
            else if (gameConfig.gameState === 'active_round') {
                let currentWin = (gameConfig.currentBet * gameConfig.currentRunningMultiplier).toFixed(2);
                container.innerHTML = `
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="triggerDropFloorLogic()" class="col-span-1 btn-state-drop text-white font-black rounded-xl flex flex-col items-center justify-center h-12 text-xl active:scale-[0.99] transition-all">
                            🏗️
                            <span class="text-[8px] font-black">DROP</span>
                        </button>
                        <button onclick="handleCashout()" class="col-span-3 btn-state-cashout text-black font-black rounded-xl flex items-center justify-center gap-3 px-4 h-12 active:scale-[0.99] transition-all">
                            <svg class="w-7 h-7 svg-coin-rotate shrink-0" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="18" cy="18" r="16" fill="url(#goldGradient)" stroke="#fff" stroke-width="1.5"/>
                                <circle cx="18" cy="18" r="12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-dasharray="3 3" stroke-width="1"/>
                                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-weight="900" font-size="16" fill="#5c3a00"></text>
                                <defs>
                                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#ffe066" />
                                        <stop offset="50%" stop-color="#f5b041" />
                                        <stop offset="100%" stop-color="#9a7d0a" />
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="flex flex-col items-start leading-tight text-right">
                                <span class="text-[9px] opacity-80 font-bold">CASHOUT IMMÉDIAT</span>
                                <span class="text-xs font-black tracking-tight">ENCAISSER : ${currentWin} (x${gameConfig.currentRunningMultiplier.toFixed(2)})</span>
                            </div>
                        </button>
                    </div>`;
            }
        }

        function handleCashout() {
            if(gameConfig.buildingFloors.length === 0) return;

            let winAmount = gameConfig.currentBet * gameConfig.currentRunningMultiplier;
            gameConfig.balance += winAmount;
            updateBalanceInFirebase(gameConfig.balance);
            
            sfx.cashout();
            createExplosionParticles(viewWidth/2, viewHeight - 140, '#00ff87', 30);
            triggerResultPopup(true, gameConfig.currentRunningMultiplier, winAmount);
            addTableStatsRecord("VOUS", gameConfig.currentRunningMultiplier, winAmount, true);
            addQuickHistoryBadge(gameConfig.currentRunningMultiplier, '#00ff87');

            endActiveRoundSystem();
        }

        function endActiveRoundSystem() {
            gameConfig.buildingFloors = [];
            targetCameraYOffset = 0;
            cameraYOffset = 0;
            gameConfig.currentRunningMultiplier = 0.0;
            gameConfig.gameState = 'idle';
            currentDropPiece = null;

            document.getElementById('current-multiplier-badge').classList.add('hidden');
            
            updateButtonInterface();
        }

        function initFakePlayers() {
            const container = document.getElementById('live-players-list');
            container.innerHTML = '';
            livePlayersData = [];
            for (let i = 0; i < 4; i++) {
                let name = fakeNames[Math.floor(Math.random() * fakeNames.length)];
                let bet = (Math.floor(Math.random() * 6) + 1) * 10;
                livePlayersData.push({ name, bet, status: 'playing' });
                
                container.innerHTML += `
                    <div class="flex flex-col bg-white/5 p-1 rounded-md text-[8px]" id="fake-p-${i}">
                        <div class="flex justify-between font-bold text-gray-300"><span>👤 ${name}</span> <span class="text-amber-400">${bet}</span></div>
                        <div class="text-[8px] text-gray-400 font-mono" id="fake-p-status-${i}">Construction...</div>
                    </div>`;
            }
        }

        function updateFakePlayersLive() {
            for (let i = 0; i < livePlayersData.length; i++) {
                let p = livePlayersData[i];
                let statusEl = document.getElementById(`fake-p-status-${i}`);
                if (!statusEl) continue;

                if (Math.random() > 0.40 && p.status === 'playing') {
                    p.status = 'cashout';
                    let finalMult = gameConfig.floorMultipliers[Math.floor(Math.random() * 3)];
                    let winAmt = p.bet * finalMult;
                    statusEl.className = "text-emerald-400 font-bold";
                    statusEl.innerText = `💵 Cashed x${finalMult.toFixed(2)} (+${winAmt.toFixed(0)})`;
                    
                    addTableStatsRecord(p.name, finalMult, winAmt, true);
                } else if (Math.random() > 0.60 || p.status === 'cashout') {
                    if (p.status === 'playing') {
                        statusEl.className = "text-red-500 font-bold";
                        statusEl.innerText = `💥 Crash x0.00`;
                        addTableStatsRecord(p.name, 0, p.bet, false);
                    }
                    
                    setTimeout(() => {
                        p.name = fakeNames[Math.floor(Math.random() * fakeNames.length)];
                        p.bet = (Math.floor(Math.random() * 8) + 1) * 10;
                        p.status = 'playing';
                        let block = document.getElementById(`fake-p-${i}`);
                        if(block) {
                            block.innerHTML = `
                                <div class="flex justify-between font-bold text-gray-300"><span>👤 ${p.name}</span> <span class="text-amber-400">${p.bet}</span></div>
                                <div class="text-[8px] text-gray-400 font-mono" id="fake-p-status-${i}">Construction...</div>`;
                        }
                    }, 1200);
                }
            }
        }

        function addTableStatsRecord(name, mult, amount, isWin) {
            const list = document.getElementById('table-stats-list');
            const row = document.createElement('div');
            row.className = `flex justify-between items-center p-1 rounded border border-white/5 text-[8px] ${isWin ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`;
            row.innerHTML = `<span>${name}</span> <span class="font-bold">${isWin ? 'x' + mult.toFixed(2) : '-' + amount}</span>`;
            list.insertBefore(row, list.firstChild);
            if(list.children.length > 8) list.removeChild(list.lastChild);
        }

        function modifyBet(amt) {}
        function setQuickBet(type) {}

        function updateAndRender() {
            ctx.clearRect(0, 0, viewWidth, viewHeight);
            ctx.save();
            if (screenShakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
                screenShakeTime--;
            }

            cameraYOffset += (targetCameraYOffset - cameraYOffset) * 0.1;

            ctx.save();
            ctx.translate(0, cameraYOffset);

            let centerX = viewWidth / 2;
            let baseY = viewHeight - 60; 
            
            let platformGrad = ctx.createLinearGradient(centerX - initialWidth/2, baseY, centerX + initialWidth/2, baseY + 30);
            platformGrad.addColorStop(0, '#f59e0b'); platformGrad.addColorStop(1, '#b45309');
            ctx.fillStyle = platformGrad; ctx.fillRect(centerX - initialWidth / 2, baseY, initialWidth, 25);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.strokeRect(centerX - initialWidth / 2, baseY, initialWidth, 25);

            let currentTargetY = baseY;
            let currentTargetLeft = centerX - initialWidth / 2;
            let currentTargetWidth = initialWidth;

            gameConfig.buildingFloors.forEach((floor, idx) => {
                currentTargetY -= floor.h;
                currentTargetLeft = floor.x;
                currentTargetWidth = floor.w;
                
                let blockGrad = ctx.createLinearGradient(floor.x, currentTargetY, floor.x, currentTargetY + floor.h);
                if(idx < 2) {
                    blockGrad.addColorStop(0, '#ff224e'); blockGrad.addColorStop(1, '#800014');
                } else {
                    blockGrad.addColorStop(0, '#e67e22'); blockGrad.addColorStop(1, '#d35400');
                }
                
                ctx.shadowColor = idx < 2 ? 'rgba(255, 34, 78, 0.3)' : 'rgba(230, 126, 34, 0.3)';
                ctx.shadowBlur = 6;
                ctx.fillStyle = blockGrad;
                ctx.fillRect(floor.x, currentTargetY, floor.w, floor.h);
                ctx.shadowBlur = 0;
                
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.strokeRect(floor.x, currentTargetY, floor.w, floor.h);
                
                ctx.fillStyle = '#ffffff'; ctx.font = '900 11px Tajawal'; ctx.textAlign = 'center';
                ctx.fillText(`x${floor.mult.toFixed(2)}`, floor.x + floor.w / 2, currentTargetY + floor.h / 2 + 4);
            });

            if (gameConfig.gameState === 'dropping' && currentDropPiece) {
                currentDropPiece.y += currentDropPiece.speedY;
                let targetCollisionY = currentTargetY - currentDropPiece.h;

                if (currentDropPiece.y >= targetCollisionY) {
                    let pieceLeft = currentDropPiece.x - currentDropPiece.w / 2;
                    let pieceRight = currentDropPiece.x + currentDropPiece.w / 2;
                    let currentTargetRight = currentTargetLeft + currentTargetWidth;

                    let overlapLeft = Math.max(pieceLeft, currentTargetLeft);
                    let overlapRight = Math.min(pieceRight, currentTargetRight);
                    let overlapWidth = overlapRight - overlapLeft;

                    if (overlapWidth <= 28) {
                        gameConfig.gameState = 'fail_anim';
                        screenShakeTime = 25;
                        sfx.lose();
                        createExplosionParticles(currentDropPiece.x, currentDropPiece.y, '#ff003c', 25);
                        addTableStatsRecord("VOUS", 0, gameConfig.currentBet, false);
                        addQuickHistoryBadge(0, '#ff003c');
                        
                        let fallTicks = 0;
                        const fallInterval = setInterval(() => {
                            currentDropPiece.y += 15;
                            fallTicks++;
                            if (fallTicks > 20) {
                                clearInterval(fallInterval);
                                triggerResultPopup(false, 0, 0);
                                endActiveRoundSystem();
                            }
                        }, 20);
                    } else {
                        let nextFloorIdx = gameConfig.buildingFloors.length;
                        let floorMult = gameConfig.floorMultipliers[Math.min(nextFloorIdx, gameConfig.floorMultipliers.length - 1)];
                        
                        gameConfig.buildingFloors.push({
                            x: overlapLeft,
                            w: overlapWidth,
                            h: currentDropPiece.h,
                            mult: floorMult
                        });

                        screenShakeTime = 6; sfx.hit();
                        createExplosionParticles(overlapLeft + overlapWidth/2, targetCollisionY, '#00ffb7', 10);

                        gameConfig.currentRunningMultiplier = floorMult;
                        gameConfig.gameState = 'active_round';
                        currentDropPiece = null;

                        const badge = document.getElementById('current-multiplier-badge');
                        badge.classList.remove('hidden');
                        badge.innerText = `Multiplicateur: x${floorMult.toFixed(2)} (${(gameConfig.currentBet * floorMult).toFixed(1)})`;

                        targetCameraYOffset = gameConfig.buildingFloors.length * floorHeight;
                        
                        updateButtonInterface();
                    }
                } else {
                    let dropGrad = ctx.createLinearGradient(currentDropPiece.x - currentDropPiece.w/2, currentDropPiece.y, currentDropPiece.x + currentDropPiece.w/2, currentDropPiece.y + currentDropPiece.h);
                    dropGrad.addColorStop(0, '#ff4500'); dropGrad.addColorStop(1, '#b30000');
                    ctx.fillStyle = dropGrad;
                    ctx.fillRect(currentDropPiece.x - currentDropPiece.w / 2, currentDropPiece.y, currentDropPiece.w, currentDropPiece.h);
                }
            }

            updateAndDrawParticles();
            ctx.restore();
            ctx.restore();

            if (gameConfig.gameState === 'idle' || gameConfig.gameState === 'active_round') {
                crane.speed = crane.baseSpeed + (gameConfig.buildingFloors.length * 0.65);
                crane.x += crane.speed * crane.dir;
                if (crane.x < 40 || crane.x > viewWidth - 40) crane.dir *= -1;

                crane.angle += 0.06 * crane.angleDir;
                if (Math.abs(crane.angle) > crane.maxAngle) crane.angleDir *= -1;
            }

            drawCraneSystem();
            requestAnimationFrame(updateAndRender);
        }

        function drawCraneSystem() {
            let hookX = crane.x + Math.sin(crane.angle) * 35;
            let hookY = crane.y + 35;

            ctx.strokeStyle = '#130d2b'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, crane.y); ctx.lineTo(viewWidth, crane.y); ctx.stroke();

            ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(crane.x, crane.y); ctx.lineTo(hookX, hookY); ctx.stroke();

            ctx.fillStyle = '#ffaa00'; ctx.fillRect(hookX - 8, hookY, 16, 6);

            if (gameConfig.gameState === 'idle' || gameConfig.gameState === 'active_round') {
                ctx.save();
                let currentLevel = gameConfig.buildingFloors.length;
                let nextWidth = initialWidth;
                if (currentLevel > 0) nextWidth = gameConfig.buildingFloors[currentLevel - 1].w;

                ctx.globalAlpha = 0.45;
                let previewGrad = ctx.createLinearGradient(hookX - nextWidth/2, hookY + 6, hookX + nextWidth/2, hookY + 6 + floorHeight);
                previewGrad.addColorStop(0, '#ff4500'); previewGrad.addColorStop(1, '#ff0000');
                ctx.fillStyle = previewGrad;
                ctx.fillRect(hookX - nextWidth / 2, hookY + 6, nextWidth, floorHeight);
                ctx.restore();
            }
        }

        function createExplosionParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 1,
                    radius: Math.random() * 2.5 + 1, alpha: 1, color: color
                });
            }
        }

        function updateAndDrawParticles() {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.045;
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                if(p.alpha <= 0) particles.splice(i, 1);
            }
        }

        function addQuickHistoryBadge(mult, color) {
            const bar = document.getElementById('quick-history-row');
            const badge = document.createElement('span');
            badge.className = 'text-[9px] font-mono font-black px-1.5 py-0.5 rounded text-white shrink-0 border border-white/5';
            badge.style.backgroundColor = color;
            badge.innerText = mult > 0 ? `x${mult.toFixed(2)}` : '💥';
            bar.insertBefore(badge, bar.firstChild);
            if(bar.children.length > 4) bar.removeChild(bar.lastChild);
        }

        function triggerResultPopup(isSuccess, mult, amt) {
            const popup = document.getElementById('win-popup');
            const box = document.getElementById('popup-box');
            const status = document.getElementById('popup-status');
            const mText = document.getElementById('win-multiplier-text');
            const aText = document.getElementById('win-amount-text');

            if (isSuccess) {
                box.className = "bg-black/95 border border-emerald-500/40 px-6 py-4 rounded-2xl text-center shadow-2xl backdrop-blur-md min-w-[200px]";
                status.className = "text-[#00ff87] text-[10px] font-black tracking-widest mb-0.5";
                status.innerText = "VICTOIRE / CASHOUT 💰";
                mText.className = "text-yellow-400 text-3xl font-black font-mono my-0.5";
                mText.innerText = `x${mult.toFixed(2)}`;
                aText.className = "text-[#00ff87] text-base font-black font-mono";
                aText.innerText = `+${amt.toFixed(1)}`;
            } else {
                box.className = "bg-black/95 border border-red-500/40 px-6 py-4 rounded-2xl text-center shadow-2xl backdrop-blur-md min-w-[200px]";
                status.className = "text-red-500 text-[10px] font-black tracking-widest mb-0.5";
                status.innerText = "CRASH / DÉFAITE 💥";
                mText.className = "text-red-500 text-3xl font-black font-mono my-0.5";
                mText.innerText = "x0.00";
                aText.className = "text-gray-400 text-[10px] font-bold";
                aText.innerText = "La tour s'est effondrée !";
            }
            
            popup.style.opacity = '1'; popup.style.transform = 'scale(1)';
            setTimeout(() => { popup.style.opacity = '0'; popup.style.transform = 'scale(0.75)'; }, 1400);
        }
    </script>
</body>
