<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mywingims | المنصة الرسمية للألعاب والمواجهات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #050608; 
            color: #fff; 
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(17, 20, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .royal-glow {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }

        .premium-balance-card {
            background: linear-gradient(160deg, #1a2236 0%, #0d111a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .leader-gold { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .leader-silver { color: #C0C0C0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.3); }
        .leader-bronze { color: #CD7F32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.3); }

        .amount-tab {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .amount-tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        
        .main-action-btn {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .deposit-btn {
            position: relative;
            overflow: hidden;
        }
        .deposit-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 40%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 60%);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .main-action-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-float { animation: floatText 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-[#050608]/80 backdrop-blur-xl border-b border-white/5 px-4 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                    <span class="text-white font-black italic text-lg">W</span>
                </div>
                <h1 class="text-xl font-black italic tracking-tighter text-white">MYWING<span class="text-blue-500">IMS</span></h1>
            </div>
            <button onclick="openSupportModal()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-blue-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M5.636 18.364l3.536-3.536m5.656 0l3.536 3.536M5.636 5.636l3.536 3.536m0 5.656l-3.536 3.536M9.172 9.172a4 4 0 115.656 5.656 4 4 0 01-5.656-5.656z"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">

        <div class="premium-balance-card rounded-3xl p-8 relative overflow-hidden royal-glow">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20"></div>
            <div class="relative z-10 text-center">
                <p class="text-blue-400 font-bold text-xs uppercase tracking-widest mb-1">الرصيد المتاح</p>
                <h2 class="text-5xl font-black text-white mb-6 tracking-tighter" id="balanceDisplay">0 <span class="text-2xl text-blue-400">DH</span></h2>
                <div class="flex justify-center gap-3">
                    <button onclick="playClickSound(); goToDeposit()" class="deposit-btn bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-3 rounded-2xl transition-all">إيداع</button>
                    <button onclick="playClickSound(); goToWithdraw()" class="bg-white/10 hover:bg-white/20 text-white font-bold px-8 py-3 rounded-2xl transition-all">سحب</button>
                </div>
                <div class="mt-6 pt-6 border-t border-white/10 flex justify-center items-center gap-2">
                    <span class="text-xs text-gray-400">المستخدم:</span>
                    <span id="userDisplay" class="font-bold text-white bg-white/5 px-3 py-1 rounded-lg border border-white/5">Ayoube</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="glass-card rounded-2xl p-4 text-center flex flex-col items-center">
                <svg class="w-5 h-5 text-blue-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                <p class="text-[10px] text-gray-500 uppercase font-bold">الانتصارات</p>
                <p class="text-lg font-black mt-1" id="winsDisplay">0</p>
            </div>
            <div class="glass-card rounded-2xl p-4 text-center flex flex-col items-center">
                <svg class="w-5 h-5 text-purple-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p class="text-[10px] text-gray-500 uppercase font-bold">المباريات</p>
                <p class="text-lg font-black mt-1" id="matchesDisplay">0</p>
            </div>
            <div class="glass-card rounded-2xl p-4 text-center flex flex-col items-center">
                <svg class="w-5 h-5 text-emerald-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                <p class="text-[10px] text-gray-500 uppercase font-bold">الأرباح</p>
                <p class="text-lg font-black mt-1 text-emerald-400"><span id="profitDisplay">0</span> <span class="text-[10px]">DH</span></p>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-sm font-bold mb-4 flex items-center gap-2">
                <span class="w-1 h-4 bg-blue-500 rounded-full"></span> اختر أو أدخل مبلغ الرهان
            </h3>
            <div class="grid grid-cols-4 gap-2 mb-4" id="amount-selector"></div>
            
            <input type="number" id="custom-amount-input" placeholder="أدخل مبلغ مخصص (DH)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mb-4 text-center text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-all">
            
            <button id="join-table-btn" onclick="playClickSound(); handlePlayClick()" class="w-full main-action-btn font-black py-4 rounded-2xl text-sm flex items-center justify-center gap-2">
                بدء المواجهة الآن
            </button>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-sm font-bold flex items-center gap-2">
                    <span class="flex relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span>
                    المباريات الحية
                </h3>
            </div>
            <div id="live-matches-container" class="space-y-3"></div>
        </div>

        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-sm font-bold mb-4">قائمة متصدري الأسبوع</h3>
            <div id="leaderboard-container" class="space-y-4"></div>
        </div>
    </main>

    <div id="support-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-lg hidden">
        <div class="glass-card w-full max-w-sm rounded-3xl p-8 text-center border-none shadow-2xl">
            <h3 class="text-lg font-black mb-4">مركز الدعم</h3>
            <p class="text-xs text-gray-400 mb-6">تواصل معنا عبر البريد المعتمد للمنصة</p>
            <div class="bg-black/40 p-4 rounded-2xl mb-6 font-mono text-xs border border-white/5">support@mywingims.com</div>
            <button onclick="closeSupportModal()" class="w-full py-3 rounded-xl bg-white text-black font-bold">إغلاق</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
      function playClickSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
      }

      const firebaseConfig = {
        apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
        authDomain: "poolcash-6692c.firebaseapp.com",
        databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
        projectId: "poolcash-6692c",
        storageBucket: "poolcash-6692c.firebasestorage.app",
        messagingSenderId: "866544389541",
        appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
      };

      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      const amountValues = [150, 200, 300, 500, 1000, 2500, 5000];
      let currentSelectedIndex = 0;
      let globalUserBalance = 0; 
      let currentUsername = "Ayoube"; 

      const selector = document.getElementById('amount-selector');
      const customInput = document.getElementById('custom-amount-input');

      amountValues.forEach((val, i) => {
        const btn = document.createElement('button');
        btn.className = 'amount-tab py-2 rounded-xl text-[10px] font-bold';
        btn.innerText = val + " DH";
        btn.onclick = () => {
            playClickSound();
            customInput.value = "";
            selectAmount(i);
        };
        selector.appendChild(btn);
      });

      customInput.addEventListener('input', () => {
          const tabs = document.querySelectorAll('.amount-tab');
          tabs.forEach(tab => tab.classList.remove('active'));
          currentSelectedIndex = -1;
          document.getElementById('join-table-btn').innerText = `العب الآن - ${customInput.value || 0} DH`;
      });

      function goToDeposit() {
          localStorage.setItem('username', currentUsername);
          window.location.href = 'deposit.html';
      }

      function goToWithdraw() {
          localStorage.setItem('username', currentUsername);
          window.location.href = 'withdraw.html';
      }

      function selectAmount(index) {
          currentSelectedIndex = index;
          const tabs = document.querySelectorAll('.amount-tab');
          tabs.forEach((tab, i) => i === index ? tab.classList.add('active') : tab.classList.remove('active'));
          document.getElementById('join-table-btn').innerText = `العب الآن - ${amountValues[index]} DH`;
      }

      function handlePlayClick() {
          const amount = currentSelectedIndex !== -1 ? amountValues[currentSelectedIndex] : parseInt(customInput.value);
          
          if (!amount || amount <= 0) {
              alert("يرجى إدخال مبلغ صحيح");
              return;
          }
          
          if (globalUserBalance < amount) {
             alert("رصيد غير كافٍ");
          } else {
              const userRef = database.ref('users/' + currentUsername);
              userRef.once('value').then((snap) => {
                  const data = snap.val() || { balance: 0, wins: 0, matches: 0, profit: 0 };
                  userRef.update({ 
                      balance: data.balance - amount,
                      matches: (data.matches || 0) + 1
                  }).then(() => window.location.href = 'games.html');
              });
          }
      }

      function startFirebaseSync(username) {
          database.ref('users/' + username).on('value', (snap) => {
              const data = snap.val();
              if (data) {
                  globalUserBalance = data.balance || 0;
                  document.getElementById('balanceDisplay').innerHTML = globalUserBalance.toLocaleString() + ' <span class="text-2xl text-blue-400">DH</span>';
                  document.getElementById('winsDisplay').innerText = data.wins || 0;
                  document.getElementById('matchesDisplay').innerText = data.matches || 0;
                  document.getElementById('profitDisplay').innerText = (data.profit || 0).toLocaleString();
              }
          });
      }

      function openSupportModal() { document.getElementById('support-modal').classList.remove('hidden'); }
      function closeSupportModal() { document.getElementById('support-modal').classList.add('hidden'); }

      function generateRandomName() {
          const names = ["ach", "wal", "you", "ham", "zak", "meh", "saa", "mar", "has", "idr"];
          return names[Math.floor(Math.random() * names.length)] + "***" + Math.floor(Math.random() * 99);
      }

      function renderLeaderboard() {
          const container = document.getElementById('leaderboard-container');
          const data = [
            {n: generateRandomName(), s: (Math.floor(Math.random() * 20000) + 5000).toLocaleString()},
            {n: generateRandomName(), s: (Math.floor(Math.random() * 10000) + 3000).toLocaleString()},
            {n: generateRandomName(), s: (Math.floor(Math.random() * 5000) + 1000).toLocaleString()}
          ];
          container.innerHTML = data.map((u, i) => `
            <div class="flex justify-between items-center text-xs">
                <div class="flex items-center gap-3">
                    <span class="font-black ${i==0?'leader-gold':i==1?'leader-silver':'leader-bronze'}">#${i+1}</span>
                    <span class="font-bold">${u.n}</span>
                </div>
                <span class="font-black text-blue-400">${u.s} DH</span>
            </div>
          `).join('');
      }

      function renderLiveMatches() {
          const container = document.getElementById('live-matches-container');
          const v = [150, 200, 300, 500, 1000];
          const results = ["فاز", "خسر"];
          const matches = Array.from({length: 4}, () => ({
              p1: generateRandomName(), 
              p2: generateRandomName(), 
              v: v[Math.floor(Math.random() * v.length)],
              res: results[Math.floor(Math.random() * results.length)]
          }));
          container.innerHTML = matches.map(m => `
            <div class="glass-card rounded-2xl p-4 flex justify-between items-center animate-pulse">
                <span class="text-xs font-bold text-gray-300">${m.p1} vs ${m.p2}</span>
                <span class="text-[10px] font-black ${m.res === 'فاز' ? 'text-green-500' : 'text-red-500'}">${m.res} - ${m.v} DH</span>
            </div>
          `).join('');
      }

      document.addEventListener("DOMContentLoaded", () => {
          renderLiveMatches();
          renderLeaderboard();
          setInterval(renderLiveMatches, 3000);
          setInterval(renderLeaderboard, 604800000);
          selectAmount(0);
          
          const urlParams = new URLSearchParams(window.location.search);
          let activeUser = urlParams.get('username') || localStorage.getItem('username') || "Ayoube";
          currentUsername = activeUser;
          
          startFirebaseSync(currentUsername);
      });
    </script>
</body>
</html>
