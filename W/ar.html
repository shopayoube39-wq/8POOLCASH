<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8POOLCASH - لوحة التحكم</title>

<style>
:root{
    --bg-color:#060a10;
    --card-bg:#10161f;
    --input-bg:#0b1016;
    --primary-gold:linear-gradient(180deg,#ffce3a 0%,#fcc316 100%);
    --border-color:#2a343f;
    --text-main:#ffffff;
    --text-muted:#808e9b;
    --success-green:#2ecc71;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:var(--bg-color);
    background-image:radial-gradient(circle at center, rgba(31,48,71,.4) 0%, rgba(6,10,16,1) 70%);
    color:var(--text-main);
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    text-align:center;
}

.logo-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
}

.ball-8{
    background:#fff;
    color:#000;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:900;
    font-size:1.4rem;
}

.logo-text{
    font-size:2.2rem;
    font-weight:900;
    font-style:italic;
}

.logo-text span{
    color:#fcc316;
}

.card{
    background:var(--card-bg);
    border:1px solid var(--border-color);
    border-radius:28px;
    padding:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.7);
    text-align:right;
}

.welcome-box {
    background: #080c12;
    border: 1px solid var(--border-color);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.avatar {
    width: 55px;
    height: 55px;
    background: var(--primary-gold);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.5rem;
    color: #000;
    font-weight: bold;
}

.user-info h3 {
    font-size: 1.2rem;
    color: var(--text-main);
    margin-bottom: 4px;
}

/* هادا هو المكان المخصص للاسم الرسمي */
#official-username {
    color: #fcc316;
    font-weight: 800;
}

.user-info p {
    font-size: 0.85rem;
    color: var(--text-muted);
}

.balance-card {
    background: linear-gradient(135deg, #1e2732 0%, #111822 100%);
    border: 1px solid rgba(252, 195, 22, 0.2);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    margin-bottom: 25px;
}

.balance-title {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 5px;
}

.balance-amount {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--text-main);
}

.balance-amount span {
    color: #fcc316;
    font-size: 1.2rem;
    margin-right: 5px;
}

.section-title {
    font-size: 1rem;
    color: var(--text-main);
    margin-bottom: 15px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
}

.services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 25px;
}

.service-item {
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.service-item:hover {
    border-color: #fcc316;
    transform: translateY(-3px);
}

.service-icon {
    font-size: 1.8rem;
    margin-bottom: 8px;
    display: block;
}

.service-name {
    font-size: 0.95rem;
    font-weight: bold;
}

.logout-btn {
    width: 100%;
    padding: 15px;
    background: rgba(255, 94, 94, 0.1);
    border: 1px solid rgba(255, 94, 94, 0.2);
    border-radius: 14px;
    color: #ff5e5e;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
}

.logout-btn:hover {
    background: rgba(255, 94, 94, 0.2);
}
</style>
</head>

<body>

<div class="container">

    <div class="logo-box">
        <div class="ball-8">8</div>
        <h1 class="logo-text">8POOL<span>CASH</span></h1>
    </div>

    <div class="card">

        <!-- صندوق الترحيب وعرض الإسم الرسمي -->
        <div class="welcome-box">
            <div class="avatar" id="user-avatar">👤</div>
            <div class="user-info">
                <h3>مرحباً، <span id="official-username">جاري التحميل...</span></h3>
                <p>نوع الحساب: <span style="color: var(--success-green);">رسمي فعال ✓</span></p>
            </div>
        </div>

        <!-- رصيد الحساب -->
        <div class="balance-card">
            <div class="balance-title">الرصيد الحالي المتوفر</div>
            <div class="balance-amount">0.00 <span>CASH</span></div>
        </div>

        <div class="section-title">
            <span>⚡</span> خدمات الشحن السريع
        </div>

        <!-- شبكة الخدمات -->
        <div class="services-grid">
            <div class="service-item">
                <span class="service-icon">🎱</span>
                <div class="service-name">شحن كوينز (Coins)</div>
            </div>
            <div class="service-item">
                <span class="service-icon">💵</span>
                <div class="service-name">شحن كاش (Cash)</div>
            </div>
            <div class="service-item">
                <span class="service-icon">🔑</span>
                <div class="service-name">حسابات جاهزة</div>
            </div>
            <div class="service-item">
                <span class="service-icon">🎟️</span>
                <div class="service-name">الـ Pass المميز</div>
            </div>
        </div>

        <!-- زر تسجيل الخروج -->
        <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج</button>

    </div>

</div>

<script>
// السكريبت الذكي لجلب الإسم الرسمي وعرضه فوراً
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. محاولة جلب الإسم من الرابط (URL Parameters) أولاً
    const urlParams = new URLSearchParams(window.location.search);
    let username = urlParams.get('username');

    // 2. إذا لم يكن ف الرابط، جلب الإسم من التخزين المحلي
    if (!username) {
        username = localStorage.getItem('username') || localStorage.getItem('u8');
    }

    // 3. عرض الإسم ف المكان المحدد
    const nameDisplay = document.getElementById('official-username');
    const avatarDisplay = document.getElementById('user-avatar');

    if (username) {
        nameDisplay.innerText = username;
        // وضع الحرف الأول من الإسم ف الصورة الرمزية (Avatar) كحركة ديزاين احترافية
        avatarDisplay.innerText = username.charAt(0).toUpperCase();
    } else {
        // حماية: إذا دخل شخص غريب بلا حساب كيرجع لصفحة الدخول
        nameDisplay.innerText = "زائر";
        window.location.replace("index.html"); 
    }
});

function handleLogout() {
    // تنظيف كاش المستخدم الحالي والرجوع لصفحة الدخول
    localStorage.removeItem('username');
    window.location.replace("index.html");
}
</script>

</body>
</html>
