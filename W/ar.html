<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8POOLCASH | المنصة الرسمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #08090c; color: #f3f4f6; }
        .premium-card { background: linear-gradient(145deg, rgba(18, 22, 32, 0.85) 0%, rgba(11, 14, 20, 0.95) 100%); border: 1px solid rgba(255, 255, 255, 0.05); }
        .amount-tab.active { background: #f59e0b; color: #08090c; font-weight: 900; }
        .main-action-btn { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #08090c; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <main class="max-w-md mx-auto px-4 mt-5 space-y-5">
        <!-- قسم الرصيد -->
        <div class="premium-card rounded-2xl p-6">
            <div class="text-center py-3">
                <span class="text-xs text-gray-400">الرصيد المتاح حالياً</span>
                <div class="text-5xl font-black text-white">
                    <span id="balanceDisplay">0</span> <span class="text-2xl text-amber-400">DH</span>
                </div>
            </div>
            <div id="warningBox" class="mt-5 p-4 border border-amber-500/15 rounded-2xl hidden">
                <h4 class="text-xs font-black text-amber-400">رصيدك غير كافي للشحن</h4>
            </div>
        </div>

        <!-- أزرار الرهان -->
        <div class="premium-card rounded-2xl p-6">
            <h3 class="text-xs font-bold mb-4">اختر مبلغ الرهان</h3>
            <div id="amountContainer" class="flex overflow-x-auto gap-2 pb-2">
                <!-- الأزرار هنا -->
            </div>
            <button id="join-table-btn" onclick="handlePlayClick()" class="w-full main-action-btn py-4 mt-4 rounded-xl font-black">
                العب الآن
            </button>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
            databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
            projectId: "poolcash-6692c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let globalUserBalance = 0;
        const currentUsername = "Ayoube"; // الاسم اللي خدام بيه

        // المزامنة الحية مع Firebase
        function startFirebaseSync() {
            const userRef = database.ref('users/' + currentUsername);
            userRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    globalUserBalance = parseFloat(data.balance || 0);
                    // تحديث الشاشة
                    document.getElementById('balanceDisplay').innerText = globalUserBalance;
                    // تحديث localStorage للعبة
                    localStorage.setItem("elite_chicken_bal", globalUserBalance);
                    
                    // إخفاء/إظهار التحذير
                    document.getElementById('warningBox').classList.toggle('hidden', globalUserBalance > 0);
                }
            });
        }

        // اختيار المبلغ
        let selectedAmount = 150;
        function selectAmount(amount) {
            selectedAmount = amount;
            document.getElementById('join-table-btn').innerText = `العب الآن - DH ${amount}`;
        }

        function handlePlayClick() {
            if (globalUserBalance < selectedAmount) {
                alert("رصيدك غير كافي!");
            } else {
                localStorage.setItem('pendingBet', selectedAmount);
                window.location.href = 'games.html';
            }
        }

        // تحميل الأزرار
        const amounts = [150, 200, 300, 500, 1000];
        const container = document.getElementById('amountContainer');
        amounts.forEach(amt => {
            const btn = document.createElement('button');
            btn.className = "amount-tab py-3 px-6 rounded-xl text-xs font-bold border border-white/10";
            btn.innerText = "DH " + amt;
            btn.onclick = () => selectAmount(amt);
            container.appendChild(btn);
        });

        startFirebaseSync();
    </script>
</body>
</html>
