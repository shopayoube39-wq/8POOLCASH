<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8POOLCASH | المنصة الرسمية للألعاب والمواجهات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #08090c; 
            color: #f3f4f6; 
            overflow-x: hidden;
        }

        .brand-bg {
            background: radial-gradient(circle at 50% 0%, #121620 0%, #08090c 80%);
        }

        .premium-card {
            background: linear-gradient(145deg, rgba(18, 22, 32, 0.85) 0%, rgba(11, 14, 20, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .brand-glow-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 20px rgba(217, 119, 6, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .brand-glow-btn:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 8px 25px rgba(217, 119, 6, 0.45);
            filter: brightness(1.08);
        }

        .live-table-row {
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .live-table-row:hover {
            background: rgba(245, 158, 11, 0.03);
            border-color: rgba(245, 158, 11, 0.25);
            transform: translateY(-1px);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #08090c; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }

        .amount-tab {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #9ca3af;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .amount-tab.active {
            background: #f59e0b;
            border-color: #f59e0b;
            color: #08090c;
            font-weight: 900;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.35);
        }
        
        .main-action-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #08090c;
            box-shadow: 0 4px 20px rgba(217, 119, 6, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .main-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(217, 119, 6, 0.45);
            filter: brightness(1.05);
        }
    </style>
</head>
<body class="brand-bg min-h-screen pb-20">

    <header class="bg-[#0b0e14]/90 sticky top-0 z-50 px-4 py-3 border-b border-white/5 backdrop-blur-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
