<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8POOLCASH - حسابي</title>

<style>
:root{
    --bg-color:#060a10;
    --card-bg:#10161f;
    --input-bg:#0b1016;
    --primary-gold:linear-gradient(180deg,#ffce3a 0%,#fcc316 100%);
    --border-color:#2a343f;
    --text-main:#ffffff;
    --text-muted:#808e9b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:var(--bg-color);
    background-image:radial-gradient(circle at center, rgba(31,48,71,.4) 0%, rgba(6,10,16,1) 70%);
    color:var(--text-main);
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    min-height:100vh;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.container{
    width:100%;
    max-width:480px;
    margin: 0 auto;
}

/* الهيدر العلوي */
.header-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.logo-side {
    font-size: 1.5rem;
    font-weight: 900;
    font-style: italic;
}
.logo-side span { color: #fcc316; }

.nav-buttons {
    display: flex;
    gap: 10px;
}

.nav-btn {
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.9rem;
}
.btn-gold { background: var(--primary-gold); color: #000; }
.btn-dark { background: #1c2635; color: #fff; border: 1px solid var(--border-color); }

/* الكارت الرئيسي */
.card{
    background:var(--card-bg);
    border:1px solid var(--border-color);
    border-radius:24px;
    padding:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.7);
    margin-bottom: 20px;
}

.account-status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.status-tag {
    background: #1e2b1e;
    color: #2ecc71;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: bold;
}

.user-title {
    font-size: 1.1rem;
    color: var(--text-muted);
}
#official-username {
    color: #fff;
    font-weight: 800;
}

/* الرصيد */
.balance-section {
    text-align: center;
    margin: 25px 0;
}
.balance-label {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 5px;
}
.balance-value {
    font-size: 3rem;
    font-weight: 900;
}
.balance-value span {
    color: #fcc316;
    font-size: 1.5rem;
    margin-right: 5px;
}

/* الإشعار الداخلي */
.alert-box-info {
    background: rgba(252, 195, 22, 0.08);
    border: 1px solid rgba(252, 195, 22, 0.2);
    border-radius: 16px;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    color: #fcc316;
}

/* الإحصائيات */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.stat-item {
    background: #0b1016;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
}
.stat-label { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 5px; }
.stat-val { font-size: 1.2rem; font-weight: bold; }

/* الرهانات والمباريات */
.section-title {
    font-size: 1rem;
    margin: 20px 0 12px 0;
    text-align: right;
    font-weight: bold;
}

.bet-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.bet-item {
    background: #0b1016;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 15px 5px;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.9rem;
}
.bet-item.active {
    border: 2px solid #fcc316;
    background: #17202c;
}

.action-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary-gold);
    border: none;
    border-radius: 14px;
    color: #000;
    font-weight: 800;
    font-size: 1.1rem;
    margin-top: 15px;
    cursor: pointer;
}

.logout-link {
    display: block;
    text-align: center;
    color: #ff5e5e;
    margin-top: 20px;
    font-size: 0.9rem;
    text-decoration: none;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">

    <div class="header-nav">
        <div class="nav-buttons">
            <button class="nav-btn btn-dark">سحب</button>
            <button class="nav-btn btn-gold">إيداع</button>
            <button class="nav-btn btn-dark">الدعم ✉</button>
        </div>
        <div class="logo-side">8POOL<span>CASH</span> 🎱</div>
    </div>

    <div class="card">
        <div class="account-status">
            <span class="status-tag">المستوى المعتمد 1</span>
            <div class="user-title">الحساب الرسمي: <span id="official-username">جاري التحميل...</span></div>
        </div>

        <div class="balance-section">
            <div class="balance-label">الرصيد المتاح حالياً</div>
            <div class="balance-value"><span id="live-balance">0</span> <span>DH</span></div>
        </div>

        <div class="alert-box-info">
            <span>⚠️</span>
            <p>رصيدك الحالي غير كافي، يرجى شحن حسابك لتتمكن من دخول غرف اللعب والمواجهة المباشرة.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">إجمالي الأرباح</div>
                <div class="stat-val" style="color:#2ecc71;">DH 0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">المباريات</div>
                <div class="stat-val">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">الانتصارات</div>
                <div class="stat-val">0</div>
            </div>
        </div>
    </div>

    <div class="section-title"> اختر مبلغ الرهان (مواجهة لاعب ضد لاعب)</div>
    <div class="bet-grid">
        <div class="bet-item">DH 500</div>
        <div class="bet-item">DH 300</div>
        <div class="bet-item active">DH 150</div>
    </div>

    <button class="action-btn">⚡ اللعب الآن - DH 150</button>
    
    <a class="logout-link" onclick="logout()">تسجيل الخروج 안전</a>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // نفس الإعدادات اللي صيفطتي ف الصورة image_8.png
  const firebaseConfig = {
    apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
    authDomain: "poolcash-6692c.firebaseapp.com",
    databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
    projectId: "poolcash-6692c",
    storageBucket: "poolcash-6692c.firebasestorage.app",
    messagingSenderId: "866544389541",
    appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // جلب إسم المستخدم الحالي من المتصفح
  const activeUser = localStorage.getItem('username');

  if (!activeUser) {
      // حماية: إلا مكاينش كونت كيرجع لصفحة تسجيل الدخول ديريكت
      window.location.replace("index.html");
  } else {
      // إظهار السمتية فوراً ف الشاشة
      document.getElementById('official-username').innerText = activeUser;

      // الاتصال بـ Firebase لجلب الصولد الحقيقي (Realtime Sync)
      const userRef = ref(db, 'users/' + activeUser);
      onValue(userRef, (snapshot) => {
          if (snapshot.exists()) {
              const data = snapshot.val();
              // تحديث الصولد ف البلاصة تع DH ديريكت
              document.getElementById('live-balance').innerText = data.balance !== undefined ? data.balance : 0;
          } else {
              // إذا مسحتي الكونت من الفايربيس كيموت الدخول هنا تلقائياً
              window.location.replace("index.html");
          }
      });
  }

  // دالة الخروج
  window.logout = function() {
      localStorage.removeItem('username');
      window.location.replace("index.html");
  }
</script>

</body>
</html>
