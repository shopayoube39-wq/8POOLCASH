<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8POOLCASH - لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d0f12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
    </style>
</head>
<body class="text-white min-h-screen pb-10">

    <header class="bg-[#14181f] p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="gold-gradient text-black font-black px-3 py-1 rounded text-xl italic">8</span>
            <span class="text-xl font-bold tracking-wider text-amber-500">8POOLCASH</span>
        </div>
        <div class="flex gap-2">
            <button class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg font-medium text-sm transition">الدعم</button>
            <button class="gold-gradient text-black hover:opacity-90 px-4 py-2 rounded-lg font-bold text-sm transition">إيداع</button>
            <button class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg font-medium text-sm transition" id="logoutBtn">سحب</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">

        <div class="bg-[#14181f] p-5 rounded-2xl border border-gray-800 space-y-4 shadow-lg">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-gray-400 text-sm">الحساب الرسمي:</span>
                    <span class="font-bold text-amber-400" id="usernameDisplay">جاري التحميل...</span>
                </div>
                <span class="text-xs bg-amber-500/10 text-amber-400 px-2 py-1 rounded border border-amber-500/20">المستوى المعتمد 1</span>
            </div>

            <div class="text-center py-4 space-y-1">
                <p class="text-gray-400 text-sm">الرصيد الحالي المتاح</p>
                <p class="text-5xl font-black text-white"><span id="balanceDisplay">0</span> <span class="text-2xl text-amber-500 font-bold">DH</span></p>
            </div>

            <div id="alertBox" class="hidden bg-amber-500/10 border border-amber-500/30 rounded-xl p-4 flex items-start gap-3">
                <i class="fas fa-exclamation-triangle text-amber-500 mt-1"></i>
                <div class="space-y-1">
                    <p class="text-amber-400 font-bold text-sm">رصيدك الحالي غير كافي</p>
                    <p class="text-gray-400 text-xs">يرجى شحن حسابك لتتمكن من دخول غرف اللعب والمواجهة المباشرة.</p>
                    <button class="text-amber-400 font-bold text-xs underline block mt-1">شحن الآن</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="bg-[#14181f] p-3 rounded-xl border border-gray-800 text-center shadow">
                <p class="text-gray-400 text-xs mb-1 font-medium">الانتصارات</p>
                <p class="text-xl font-bold text-white" id="winsDisplay">0</p>
            </div>
            <div class="bg-[#14181f] p-3 rounded-xl border border-gray-800 text-center shadow">
                <p class="text-gray-400 text-xs mb-1 font-medium">المباريات</p>
                <p class="text-xl font-bold text-white" id="matchesDisplay">0</p>
            </div>
            <div class="bg-[#14181f] p-3 rounded-xl border border-gray-800 text-center shadow">
                <p class="text-gray-400 text-xs mb-1 font-medium">إجمالي الأرباح</p>
                <p class="text-lg font-bold text-green-400"><span id="earningsDisplay">0</span> DH</p>
            </div>
        </div>

        <div class="bg-[#14181f] p-5 rounded-2xl border border-gray-800 space-y-4 shadow-lg">
            <h3 class="font-bold text-sm text-gray-300 flex items-center gap-2">
                <span class="w-1 h-4 bg-amber-500 rounded"></span> اختر مبلغ الرهان
            </h3>
            
            <div class="grid grid-cols-3 gap-2" id="betOptionsContainer">
                <button onclick="selectBet(150)" class="bet-btn bg-[#1a202c]/50 hover:bg-[#1a202c] border border-gray-800 py-3 rounded-xl font-bold text-sm transition" data-amount="150">DH 150</button>
                <button onclick="selectBet(200)" class="bet-btn bg-[#1a202c]/50 hover:bg-[#1a202c] border border-gray-800 py-3 rounded-xl font-bold text-sm transition" data-amount="200">DH 200</button>
                <button onclick="selectBet(300)" class="bet-btn bg-[#1a202c]/50 hover:bg-[#1a202c] border border-gray-800 py-3 rounded-xl font-bold text-sm transition" data-amount="300">DH 300</button>
            </div>

            <button id="playBtn" class="w-full bg-[#1c2330] text-gray-500 font-bold py-4 rounded-xl flex items-center justify-center gap-2 cursor-not-allowed transition" disabled>
                <i class="fas fa-bolt"></i> اختر مبلغ الرهان أولاً
            </button>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-sm font-bold text-gray-300 flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span> المباريات الحية الجارية الآن
                </h3>
                <span class="text-xs bg-red-500/10 text-red-400 px-2 py-0.5 rounded-full" id="activeCount">active 137</span>
            </div>

            <div class="space-y-2" id="liveMatchesContainer"></div>
        </div>

    </main>

    <script>
        // البيانات الافتراضية مطابقة تماماً للصورة المعروضة
        const currentUserData = {
            username: "Aikzske",
            balance: 401,        // الرصيد الحالي المتاح (عند الشحن هذا فقط ما يتغير)
            totalEarnings: 401, // إجمالي الأرباح (منفصل تماماً عن الشحن)
            matchesPlayed: 0,
            wins: 0
        };

        let selectedBetAmount = null;

        function initDashboard() {
            document.getElementById('usernameDisplay').innerText = currentUserData.username;
            document.getElementById('balanceDisplay').innerText = currentUserData.balance;
            document.getElementById('earningsDisplay').innerText = currentUserData.totalEarnings;
            document.getElementById('matchesDisplay').innerText = currentUserData.matchesPlayed;
            document.getElementById('winsDisplay').innerText = currentUserData.wins;

            generateLiveMatches();
        }

        function selectBet(amount) {
            selectedBetAmount = amount;
            
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.className = "bet-btn bg-[#1a202c]/50 hover:bg-[#1a202c] border border-gray-800 py-3 rounded-xl font-bold text-sm transition text-white";
                if(parseInt(btn.getAttribute('data-amount')) === amount) {
                    btn.className = "bet-btn bg-amber-500 text-black border border-amber-500 py-3 rounded-xl font-bold text-sm transition";
                }
            });

            const alertBox = document.getElementById('alertBox');
            const playBtn = document.getElementById('playBtn');

            if (currentUserData.balance < amount) {
                alertBox.classList.remove('hidden');
                playBtn.className = "w-full bg-[#1c2330] text-gray-500 font-bold py-4 rounded-xl flex items-center justify-center gap-2 cursor-not-allowed transition";
                playBtn.innerText = `الرصيد غير كافي لرهان ${amount} DH`;
                playBtn.disabled = true;
            } else {
                alertBox.classList.add('hidden');
                playBtn.className = "w-full gold-gradient text-black font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:opacity-90 shadow-lg shadow-amber-500/20 transition cursor-pointer";
                playBtn.innerHTML = `<i class="fas fa-bolt"></i> العب الآن - DH ${amount}`;
                playBtn.disabled = false;
            }
        }

        function generateLiveMatches() {
            const container = document.getElementById('liveMatchesContainer');
            // أسماء وقيم مطابقة ومقاربة للصورة المرفقة
            const matchesData = [
                { p1: 'meh***ax', p2: 'oth***k', amt: 500 },
                { p1: 'bil***ro', p2: 'jal***ol', amt: 200 }
            ];
            
            container.innerHTML = '';

            matchesData.forEach(match => {
                const matchHTML = `
                    <div class="bg-[#14181f] p-4 rounded-xl border border-gray-800/80 flex justify-between items-center">
                        <div class="space-y-1">
                            <p class="text-sm text-amber-500 font-bold">DH ${match.amt}</p>
                            <p class="text-green-400 text-xs flex items-center gap-1 mt-1">
                                مباشر
                            </p>
                        </div>
                        <div class="text-left text-sm font-medium text-gray-300">
                            <span>${match.p1}</span> <span class="text-gray-500 text-xs px-1">ضد</span> <span>${match.p2}</span>
                            <p class="text-[11px] text-gray-500 text-left mt-0.5">مواجهة جارية الآن</p>
                        </div>
                    </div>
                `;
                container.innerHTML += matchHTML;
            });
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
