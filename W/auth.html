<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8POOLCASH - Premium System</title>

<style>
:root{
    --bg-color:#060a10;
    --card-bg:#10161f;
    --input-bg:#0b1016;
    --primary-gold:linear-gradient(180deg,#ffce3a 0%,#fcc316 100%);
    --border-color:#2a343f;
    --text-main:#ffffff;
    --text-muted:#808e9b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:var(--bg-color);
    background-image:radial-gradient(circle at center, rgba(31,48,71,.4) 0%, rgba(6,10,16,1) 70%);
    color:var(--text-main);
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:480px;
    text-align:center;
}

.logo-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
}

.ball-8{
    background:#fff;
    color:#000;
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:900;
    font-size:1.6rem;
}

.logo-text{
    font-size:2.5rem;
    font-weight:900;
    font-style:italic;
}

.logo-text span{
    color:#fcc316;
}

.card{
    background:var(--card-bg);
    border:1px solid var(--border-color);
    border-radius:28px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.7);
}

.tabs{
    display:flex;
    background:#080c12;
    border-radius:14px;
    margin-bottom:30px;
    padding:5px;
}

.tab{
    flex:1;
    padding:14px;
    border:none;
    background:none;
    color:var(--text-muted);
    font-weight:bold;
    cursor:pointer;
    font-size:1rem;
    transition:.3s;
}

.tab.active{
    background:var(--primary-gold);
    color:#000;
    border-radius:12px;
}

.form-content{
    display:none;
    text-align:right;
}

.form-content.active{
    display:block;
}

.group{
    margin-bottom:18px;
}

input{
    width:100%;
    padding:16px;
    background:var(--input-bg);
    border:1px solid var(--border-color);
    border-radius:14px;
    color:white;
    font-size:1rem;
    outline:none;
}

input:focus{
    border-color:#fcc316;
}

.country-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
}

.c-item{
    background:var(--input-bg);
    border:1px solid var(--border-color);
    padding:14px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:.2s;
}

.c-item:hover{
    border-color:#555;
}

.c-item.selected{
    border:2px solid #fcc316;
    background:#121a24;
}

.alert-box{
    background:rgba(255,94,94,.15);
    color:#ff5e5e;
    border:1px solid rgba(255,94,94,.3);
    border-radius:15px;
    padding:12px;
    font-size:.9rem;
    margin-bottom:15px;
    display:none;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.btn{
    width:100%;
    padding:18px;
    background:var(--primary-gold);
    border:none;
    border-radius:16px;
    color:#000;
    font-weight:800;
    font-size:1.1rem;
    cursor:pointer;
}

.btn:disabled{
    opacity:.8;
    cursor:not-allowed;
}

.loader{
    width:22px;
    height:22px;
    border:3px solid #000;
    border-bottom-color:transparent;
    border-radius:50%;
    display:inline-block;
    animation:rotation 1s linear infinite;
}

@keyframes rotation{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.footer-text{
    margin-top:25px;
    color:#4d5d6d;
    font-size:.85rem;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo-box">
        <div class="ball-8">8</div>
        <h1 class="logo-text">8POOL<span>CASH</span></h1>
    </div>

    <div class="card">

        <div class="tabs">
            <button class="tab active" id="loginTab" onclick="showForm('login')">
                تسجيل الدخول
            </button>

            <button class="tab" id="registerTab" onclick="showForm('register')">
                حساب جديد
            </button>
        </div>

        <div id="statusAlert" class="alert-box">
            <span id="statusText"></span>
            <span>⚠️</span>
        </div>

        <div id="loginForm" class="form-content active">
            <div class="group">
                <input type="text" id="lUser" placeholder="اسم المستخدم">
            </div>

            <div class="group">
                <input type="password" id="lPass" placeholder="كلمة المرور">
            </div>

            <button class="btn" id="lBtn" onclick="handleLogin()">
                <span id="lBtnText">دخول ⚡</span>
            </button>
        </div>

        <div id="registerForm" class="form-content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="fName" placeholder="الاسم الأول" style="flex:1">
                <input type="text" id="lName" placeholder="اسم العائلة" style="flex:1">
            </div>

            <div class="group">
                <input type="email" id="email" placeholder="البريد الإلكتروني (Gmail)">
            </div>

            <label style="display:block; margin-bottom:10px; font-size:.9rem; color:var(--text-muted); text-align:right;">
                الدولة *
            </label>

            <div class="country-grid">
                <div class="c-item" onclick="selectCountry(this)">
                    <span>المغرب</span><span>🇲🇦</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>الجزائر</span><span>🇩🇿</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>تونس</span><span>🇹🇳</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>الكويت</span><span>🇰🇼</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>العراق</span><span>🇮🇶</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>السعودية</span><span>🇸🇦</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>الإمارات</span><span>🇦🇪</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>الأردن</span><span>🇯🇴</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>مصر</span><span>🇪🇬</span>
                </div>
                <div class="c-item" onclick="selectCountry(this)">
                    <span>ليبيا</span><span>🇱🇾</span>
                </div>
            </div>

            <div class="group">
                <input type="text" id="rUser" placeholder="اسم المستخدم">
            </div>

            <div class="group">
                <input type="password" id="rPass" placeholder="كلمة المرور (6+ أحرف)">
            </div>

            <button class="btn" id="rBtn" onclick="handleRegister()">
                <span id="rBtnText">إنشاء الحساب 🎱</span>
            </button>
        </div>

    </div>

    <div class="footer-text">
        بالتسجيل توافق على الشروط. العب بمسؤولية.
    </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // إعدادات Firebase الخاصة بتطبيقك
  const firebaseConfig = {
    apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
    authDomain: "poolcash-6692c.firebaseapp.com",
    databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
    projectId: "poolcash-6692c",
    storageBucket: "poolcash-6692c.firebasestorage.app",
    messagingSenderId: "866544389541",
    appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
  };

  // تهيئة الاتصال
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ⚡ الفحص التلقائي الفوري لتوجيه المستخدم لـ ar.html إذا كان مسجلاً ديجا ⚡
  const savedUser = localStorage.getItem('username');
  if (savedUser) {
      window.location.replace("ar.html");
  }

  // دالة إنشاء الحساب والتحقق من البيانات وصيغة البريد الإلكتروني
  window.handleRegister = async function() {
      const firstName = document.getElementById('fName').value.trim();
      const lastName = document.getElementById('lName').value.trim();
      const email = document.getElementById('email').value.trim();
      const user = document.getElementById('rUser').value.trim();
      const pass = document.getElementById('rPass').value;

      const btn = document.getElementById('rBtn');
      const text = document.getElementById('rBtnText');

      // 1. التحقق الفوري من تعبئة الحقول الأساسية
      if(!firstName || !lastName || !email || !user || pass.length < 6){
          triggerAlert('تأكد من إدخال جميع البيانات (كلمة المرور لا تقل عن 6 أحرف)');
          return;
      }

      // 2. فحص صيغة الإيميل (تأكيد وجود الـ @ والـ دوت كوم والتركيبة الصحيحة)
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
          triggerAlert('يرجى إدخال بريد إلكتروني صحيح وصيغة معتمدة (مثال: email@gmail.com)');
          return;
      }

      if(window.selectedCountryName === ""){
          triggerAlert('اختر الدولة من فضلك');
          return;
      }

      document.getElementById('statusAlert').style.display = 'none';
      btn.disabled = true;
      text.innerHTML = '<span class="loader"></span>';

      try {
          // التحقق من السيرفر إذا كان اسم المستخدم مستعملاً من قبل شخص آخر
          const userRef = ref(db, 'users/' + user);
          const snapshot = await get(userRef);

          if (snapshot.exists()) {
              triggerAlert('اسم المستخدم هذا محجوز بالفعل! اختر اسماً آخر.');
              btn.disabled = false;
              text.innerHTML = 'إنشاء الحساب 🎱';
              return;
          }

          // حفظ البيانات كاملة في المسار المخصص باسم المستخدم الفريد
          await set(userRef, {
              firstName: firstName,
              lastName: lastName,
              email: email,
              country: window.selectedCountryName,
              username: user,
              password: pass,
              balance: 0,   // الصولد الأولي الافتراضي للشحن
              earnings: 0   // الأرباح مفصولة تماماً من البداية
          });

          // تخزين الهوية محلياً لتثبيت الجلسة
          localStorage.setItem('username', user);

          setTimeout(() => {
              window.location.replace("ar.html");
          }, 1500);

      } catch (error) {
          triggerAlert('خطأ أثناء عملية التسجيل: ' + error.message);
          btn.disabled = false;
          text.innerHTML = 'إنشاء الحساب 🎱';
      }
  }

  // دالة تسجيل الدخول والتحقق من صحة البيانات من السيرفر مباشرة
  window.handleLogin = async function() {
      const user = document.getElementById('lUser').value.trim();
      const pass = document.getElementById('lPass').value;

      const btn = document.getElementById('lBtn');
      const text = document.getElementById('lBtnText');

      if(!user || !pass) {
          triggerAlert('أدخل اسم المستخدم وكلمة المرور');
          return;
      }

      document.getElementById('statusAlert').style.display = 'none';
      btn.disabled = true;
      text.innerHTML = '<span class="loader"></span>';

      try {
          // جلب بيانات اسم المستخدم المكتوب من السيرفر للتحقق منها
          const userRef = ref(db, 'users/' + user);
          const snapshot = await get(userRef);

          if (snapshot.exists()) {
              const userData = snapshot.val();
              
              // مقارنة كلمة المرور المدخلة بتلك المخزنة على السيرفر
              if (userData.password === pass) {
                  localStorage.setItem('username', user);

                  setTimeout(() => {
                      window.location.replace("ar.html");
                  }, 1200);
              } else {
                  triggerAlert('المعلومات غير صحيحة! تأكد من كلمة المرور.');
                  btn.disabled = false;
                  text.innerHTML = 'دخول ⚡';
              }
          } else {
              triggerAlert('اسم المستخدم غير موجود، يرجى فتح حساب أولاً.');
              btn.disabled = false;
              text.innerHTML = 'دخول ⚡';
          }

      } catch (error) {
          triggerAlert('خطأ في الاتصال بقاعدة البيانات: ' + error.message);
          btn.disabled = false;
          text.innerHTML = 'دخول ⚡';
      }
  }
</script>

<script>
// وظائف تبديل الواجهات الجانبية
function showForm(type){
    document.getElementById('statusAlert').style.display = 'none';

    if(type === 'login') {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('registerTab').classList.remove('active');
    } else {
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('registerTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
    }
}

window.selectedCountryName = "";

function selectCountry(el){
    document.querySelectorAll('.c-item').forEach(item=>{
        item.classList.remove('selected');
    });
    el.classList.add('selected');
    window.selectedCountryName = el.querySelector('span').innerText;
}

function triggerAlert(msg){
    const box = document.getElementById('statusAlert');
    document.getElementById('statusText').innerText = msg;
    box.style.display = 'flex';
}
</script>

</body>
</html>
