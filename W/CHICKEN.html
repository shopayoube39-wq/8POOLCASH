<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020408; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="p-6">

    <a href="games.html" class="block w-full mb-6 bg-gray-800 text-center p-3 rounded-xl border border-gray-600">
        ← العودة للرئيسية
    </a>

    <div class="max-w-md mx-auto bg-[#111520] p-6 rounded-3xl border border-amber-500/20">
        <h2 class="text-center text-xl font-bold mb-4">الرصيد الرئيسي: <span id="balance" class="text-amber-500">0</span> 🪙</h2>
        
        <input type="number" id="bet-amount" value="100" class="w-full bg-black p-4 rounded-xl text-center mb-4 text-white">
        
        <button id="btn-start" onclick="playGame()" class="w-full bg-blue-600 p-4 rounded-xl font-bold mb-2">لعب الآن 🚀</button>
        <button id="btn-cashout" onclick="cashOut()" disabled class="w-full bg-green-600 p-4 rounded-xl font-bold">سحب الأرباح 💰</button>
    </div>

    <script>
        // قراءة الرصيد من النظام
        let balance = parseFloat(localStorage.getItem("elite_chicken_bal")) || 0;
        let currentBet = 0;

        function updateUI() {
            document.getElementById("balance").innerText = Math.floor(balance);
            localStorage.setItem("elite_chicken_bal", Math.floor(balance));
        }

        function playGame() {
            let bet = parseInt(document.getElementById("bet-amount").value);
            if (balance >= bet) {
                balance -= bet;
                currentBet = bet;
                document.getElementById("btn-start").disabled = true;
                document.getElementById("btn-cashout").disabled = false;
                updateUI();
            } else {
                alert("الرصيد غير كافٍ للشحن!");
            }
        }

        function cashOut() {
            // منطق الربح (مثال: ربح 50%)
            let win = currentBet * 1.5;
            balance += win;
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-cashout").disabled = true;
            updateUI();
            alert("مبروك ربحتي: " + win);
        }

        updateUI();
    </script>
</body>
</html>
