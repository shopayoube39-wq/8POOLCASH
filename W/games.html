<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #08090c; color: white; font-family: 'Cairo', sans-serif; }
        .game-card { 
            background: #111520; 
            border-radius: 20px; 
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .game-card:hover { 
            border-color: #f59e0b; 
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(245, 158, 11, 0.2);
        }
        .game-img { width: 100%; height: 140px; object-fit: cover; border-radius: 14px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-[400px] mx-auto">
        <div class="relative mb-8">
            <input type="text" id="searchInput" oninput="filterGames()" 
                   placeholder="بحث عن ألعاب..." 
                   class="w-full bg-[#111520] p-4 rounded-2xl border border-white/5 text-sm focus:border-amber-500 outline-none transition-all text-center">
        </div>

        <div id="games-container" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        // هنا كتحط كاع الألعاب ديالك - أي لعبة زدتيها هنا، كطلع أوتوماتيك فالبحث
        const myGames = [
            { id: 'chicken-pro', name: 'CHICKEN PRO', provider: 'ORIGINALS', img: 'https://i.postimg.cc/PxX81N92/6753D2AB-5759-41C9-97FE-B02C51510A36.png' },
            { id: 'sweet-bonanza', name: 'Sweet Bonanza', provider: 'PragmaticPlay', img: 'https://i.imgur.com/bH9q1W2.png' },
            { id: 'le-bandit', name: 'Le Bandit', provider: 'Hacksaw', img: 'https://i.imgur.com/gOq7a2a.png' },
            { id: 'gates-zeus', name: 'Gates of Olympus', provider: 'PragmaticPlay', img: 'https://i.imgur.com/ZeusImage.png' }
        ];

        function renderGames(gamesArray) {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            gamesArray.forEach(game => {
                container.innerHTML += `
                    <button onclick="selectGame('${game.id}')" class="game-card">
                        <img src="${game.img}" class="game-img" alt="${game.name}">
                        <div class="p-3 text-start">
                            <h3 class="text-xs font-bold truncate">${game.name}</h3>
                            <p class="text-[9px] text-amber-500 font-bold uppercase mt-1">${game.provider}</p>
                        </div>
                    </button>
                `;
            });
        }

        function filterGames() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = myGames.filter(game => game.name.toLowerCase().includes(searchTerm));
            renderGames(filtered);
        }

        function selectGame(gameId) {
            localStorage.setItem('currentGame', gameId);
            window.location.href = 'game-play.html';
        }

        // باش نلـوديو الألعاب فاش تحل الصفحة
        renderGames(myGames);
    </script>
</body>
</html>
