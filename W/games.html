<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP PLAY | Dashboard</title>
    <style>
        :root {
            --bg-main: #0a0a0a; /* أسود فخم */
            --bg-card: #141414; /* كروت سوداء مغايرة */
            --accent-red: #ff1e27; /* أحمر ناري */
            --accent-red-hover: #d6121a;
            --text-white: #ffffff; /* أبيض ناصع */
            --text-muted: #a0a0a0;
            --gold: #d4af37; /* ذهبي ملكي للرصيد */
            --gold-glow: rgba(212, 175, 55, 0.2);
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4%;
            background: #000000;
            border-bottom: 2px solid var(--accent-red);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(255, 30, 39, 0.1);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .logo-area span {
            color: var(--accent-red);
        }

        .right-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-white);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .lang-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* الرصيد أرقام نقية تماماً بدون رموز */
        .balance-container {
            background: #111111;
            border: 1px solid var(--gold);
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 18px;
            color: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 40px;
            border-right: 4px solid var(--accent-red);
            padding-right: 15px;
        }
        
        html[dir="ltr"] .section-header {
            border-right: none;
            border-left: 4px solid var(--accent-red);
            padding-left: 15px;
        }

        .section-title {
            font-size: 32px;
            font-weight: 800;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-red);
            box-shadow: 0 15px 30px rgba(255, 30, 39, 0.15);
        }

        .game-preview {
            height: 180px;
            background: #181818;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .game-preview svg {
            width: 90px;
            height: 90px;
        }

        .game-info {
            padding: 25px;
        }

        .game-tag {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(214, 175, 55, 0.1);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 12px;
            border: 1px solid rgba(214, 175, 55, 0.2);
        }

        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
            height: 45px;
            overflow: hidden;
        }

        .btn-play {
            width: 100%;
            background: var(--accent-red);
            color: var(--text-white);
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .game-card:hover .btn-play {
            background: var(--accent-red-hover);
            box-shadow: 0 0 15px rgba(255, 30, 39, 0.4);
        }

        /* أنيميشن الدجاجة */
        @keyframes chicken-move {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.08) rotate(-5deg); }
        }
        .card-chicken:hover svg {
            animation: chicken-move 0.5s infinite alternate ease-in-out;
        }

        /* أنيميشن البلياردو */
        @keyframes cue-hit {
            0% { transform: translateX(0); }
            30% { transform: translateX(-10px); }
            100% { transform: translateX(15px); }
        }
        @keyframes white-ball {
            0%, 30% { transform: translateX(0); }
            100% { transform: translateX(40px); opacity: 0.8; }
        }
        .card-billiards:hover .cue-stick {
            animation: cue-hit 0.8s infinite alternate ease-in-out;
        }
        .card-billiards:hover .white-ball {
            animation: white-ball 0.8s infinite alternate ease-in-out;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span>VIP</span>PLAY
        </div>
        <div class="right-section">
            <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle-btn">Français</button>
            <div class="balance-container">
                <span id="user-balance">0.00</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section-header">
            <h2 class="section-title" id="main-title">الألعاب الأساسية</h2>
        </div>
        
        <div class="games-grid">

            <!-- لعبة التشيكن -->
            <div class="game-card card-chicken" onclick="playGame('chicken')">
                <div class="game-preview">
                    <svg viewBox="0 0 64 64">
                        <circle cx="32" cy="32" r="28" fill="#141414" stroke="#d4af37" stroke-width="2"/>
                        <path d="M22 40 C22 25, 42 25, 42 40 Z" fill="#ffffff"/>
                        <circle cx="36" cy="30" r="3" fill="#000"/>
                        <polygon points="42,30 48,33 42,36" fill="#ff1e27"/>
                        <path d="M28 25 Q 32 18, 36 25" fill="none" stroke="#ff1e27" stroke-width="3"/>
                    </svg>
                </div>
                <div class="game-info">
                    <span class="game-tag" id="tag-chicken">VIP • موصى به</span>
                    <h3 class="game-title">Chicken Adventure</h3>
                    <p class="game-desc" id="desc-chicken">ارفع أغطية الأطباق بحذر، اعثر على الدجاج وتجنب العظام لمضاعفة رصيدك فوراً.</p>
                    <button class="btn-play" id="btn-chicken">إبدأ اللعب</button>
                </div>
            </div>

            <!-- لعبة البلياردو -->
            <div class="game-card card-billiards" onclick="playGame('billiards')">
                <div class="game-preview">
                    <svg viewBox="0 0 100 100">
                        <rect x="10" y="25" width="80" height="50" rx="4" fill="#1a1a1a" stroke="#222" stroke-width="2"/>
                        <circle cx="65" cy="50" r="6" fill="#ff1e27"/>
                        <circle class="white-ball" cx="40" cy="50" r="6" fill="#ffffff"/>
                        <line class="cue-stick" x1="15" y1="50" x2="32" y2="50" stroke="#d4af37" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="game-info">
                    <span class="game-tag" id="tag-billiards">بطولات لايف</span>
                    <h3 class="game-title">Billiards 2D Pro</h3>
                    <p class="game-desc" id="desc-billiards">أظهر مهاراتك الفائقة في توجيه الكرات، وسجل ضربات احترافية لربح الجولة فوراً.</p>
                    <button class="btn-play" id="btn-billiards">إبدأ اللعب</button>
                </div>
            </div>

        </div>
    </div>

    <!-- استدعاء مكتبات الـ Firebase المتوافقة مع الكود الأساسي الخاص بك -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // تكوين الـ Firebase المتزامن مع المنصة بالكامل
        const firebaseConfig = {
            apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
            authDomain: "poolcash-6692c.firebaseapp.com",
            databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
            projectId: "poolcash-6692c",
            storageBucket: "poolcash-6692c.firebasestorage.app",
            messagingSenderId: "866544389541",
            appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
        };

        // تهيئة الـ Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentLang = 'ar';
        let currentUsername = "Ayoube"; // الحساب الافتراضي في حال عدم وجود حساب بالرابط أو الكاش

        const translations = {
            ar: {
                title: "الألعاب الأساسية",
                btnLang: "Français",
                btnPlay: "إبدأ اللعب",
                chickenTag: "VIP • موصى به",
                chickenDesc: "ارفع أغطية الأطباق بحذر، اعثر على الدجاج وتجنب العظام لمضاعفة رصيدك فوراً.",
                billiardsTag: "بطولات لايف",
                billiardsDesc: "أظهر مهاراتك الفائقة في توجيه الكرات، وسجل ضربات احترافية لربح الجولة فوراً."
            },
            fr: {
                title: "Jeux Principaux",
                btnLang: "العربية",
                btnPlay: "Jouer Maintenant",
                chickenTag: "VIP • Recommandé",
                chickenDesc: "Soulevez les cloches avec soin, trouvez les poulets et évitez les os pour multiplier votre solde.",
                billiardsTag: "Tournois Live",
                billiardsDesc: "Montrez vos compétences de visée et réussissez des coups pros pour gagner instantanément."
            }
        };

        function toggleLanguage() {
            const htmlEl = document.getElementById('app-html');
            
            if (currentLang === 'ar') {
                currentLang = 'fr';
                htmlEl.setAttribute('lang', 'fr');
                htmlEl.setAttribute('dir', 'ltr');
                
                document.getElementById('lang-toggle-btn').innerText = translations.fr.btnLang;
                document.getElementById('main-title').innerText = translations.fr.title;
                document.getElementById('tag-chicken').innerText = translations.fr.chickenTag;
                document.getElementById('desc-chicken').innerText = translations.fr.chickenDesc;
                document.getElementById('btn-chicken').innerText = translations.fr.btnPlay;
                document.getElementById('tag-billiards').innerText = translations.fr.billiardsTag;
                document.getElementById('desc-billiards').innerText = translations.fr.billiardsDesc;
                document.getElementById('btn-billiards').innerText = translations.fr.btnPlay;
            } else {
                currentLang = 'ar';
                htmlEl.setAttribute('lang', 'ar');
                htmlEl.setAttribute('dir', 'rtl');
                
                document.getElementById('lang-toggle-btn').innerText = translations.ar.btnLang;
                document.getElementById('main-title').innerText = translations.ar.title;
                document.getElementById('tag-chicken').innerText = translations.ar.chickenTag;
                document.getElementById('desc-chicken').innerText = translations.ar.chickenDesc;
                document.getElementById('btn-chicken').innerText = translations.ar.btnPlay;
                document.getElementById('tag-billiards').innerText = translations.ar.billiardsTag;
                document.getElementById('desc-billiards').innerText = translations.ar.billiardsDesc;
                document.getElementById('btn-billiards').innerText = translations.ar.btnPlay;
            }
        }

        // دالة ربط وبدء مزامنة رصيد اللاعب من الـ Firebase فوراّ
        function startBalanceSync(username) {
            if (!username) return;
            
            const userRef = database.ref('users/' + username);
            userRef.on('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData) {
                    // سحب الرصيد وتحديث الواجهة مباشرة بدون رموز إضافية وبأرقام نقية كما طلبت
                    let balance = userData.balance !== undefined ? parseFloat(userData.balance) : 0;
                    const balanceEl = document.getElementById('user-balance');
                    if(balanceEl) {
                        balanceEl.innerText = balance.toFixed(2);
                    }
                }
            }, (error) => {
                console.error("خطأ أثناء مزامنة رصيد واجهة اللعبة:", error);
            });
        }

        // دالة الدخول ولعب اللعبة
        function playGame(game) {
            console.log(`Lancement de la table: ${game}`);
            // توجيه اللاعب لصفحة اللعبة مع الاحتفاظ باسم الحساب المسجل
            localStorage.setItem('username', currentUsername);
            if (game === 'chicken') {
                window.location.href = 'chicken.html';
            } else if (game === 'billiards') {
                window.location.href = 'games.html'; // أو الصفحة المرتبطة بالبلياردو لديك
            }
        }

        // تشغيل التحقق عند تحميل الصفحة بالكامل واكتشاف الحساب النشط
        document.addEventListener("DOMContentLoaded", () => {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let activeUser = urlParams.get('username') || urlParams.get('user');

                if (!activeUser) {
                    activeUser = localStorage.getItem('username');
                }

                if (activeUser) {
                    currentUsername = activeUser.trim();
                    if (currentUsername.includes('@')) {
                        currentUsername = currentUsername.split('@')[0];
                    }
                }

                // بدء جلب وعرض الرصيد فورياً بناءً على الحساب
                startBalanceSync(currentUsername);

            } catch (e) {
                console.error("حدث مشكل بمزامنة كاش الحساب النشط:", e);
            }
        });
    </script>
</body>
</html>
