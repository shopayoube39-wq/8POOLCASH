<script>

function updateBalance(amount) {

const canvas = document.getElementById("billiards-canvas");
const ctx = canvas.getContext("2d");

const FRICTION = 0.988; 
const BALL_RADIUS = 11.5;
const POCKET_RADIUS = 21; 
const TABLE_PADDING = 18;

let cueStyle = "classic";
let spinX = 0; let spinY = 0; 

let balls = [];
let particles = [];
let cueBall = null;
let gameState = "aiming"; 
let currentTurn = "player";

let isDraggingAim = false;
let aimAngle = 0;
let aimPower = 0;

let tableAssigned = false;
let playerGroup = null; 
let oppGroup = null;
let playerPocketed = [];
let oppPocketed = [];

let ballsPocketedThisTurn = [];
let firstBallHitThisTurn = null;

const pockets = [
  { x: 18, y: 18 }, { x: 400, y: 14 }, { x: 782, y: 18 },
  { x: 18, y: 382 }, { x: 400, y: 386 }, { x: 782, y: 382 }
];

const onlineOpponents = [
  { name: "Lucas 🇫🇷", skill: 0.78 }, { name: "Karim 🇩🇿", skill: 0.86 }, { name: "Mehdi 🇹🇳", skill: 0.82 }, { name: "Youssef 🇲🇦", skill: 0.96 }
];
let currentOpponent = onlineOpponents[0];

let leaderboardData = [
  { name: "Youssef 🇲🇦", score: 1900 }, { name: "Vous", score: 0 },
  { name: "Lucas 🇫🇷", score: 750 }, { name: "Karim 🇩🇿", score: 400 }
];

const AudioEngine = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  playHit(volume) {
    try {
      this.init(); let vol = Math.min(1, Math.max(0.05, volume));
      let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.type = 'triangle'; osc.frequency.setValueAtTime(160, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(35, this.ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(vol * 0.4, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.08);
    } catch(e){}
  },
  playBounce(volume) {
    try {
      this.init(); let vol = Math.min(1, Math.max(0.05, volume));
      let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(95, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(45, this.ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(vol * 0.25, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    } catch(e){}
  },
  playPocket() {
    try {
      this.init(); let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(220, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, this.ctx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.25);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.25);
    } catch(e){}
  }
};

function showToast(msg) {
  const container = document.getElementById("toast-container");
  container.innerHTML = `<div class="toast">${msg}</div>`;

function updateLeaderboardUI() {
  let playerRow = leaderboardData.find(i => i.name === "Vous");
  if(playerRow) playerRow.score = userSolde;
  leaderboardData.sort((a,b) => b.score - a.score);
  const container = document.getElementById("leaderboard-list");
  container.innerHTML = "";

      <span>#${index+1} ${item.name}</span><span>${item.score}</span>
    </div>`;
  });
}

function buyCue(style, price) {
  if (cueStyle === style) return;
  if (userSolde < price && style !== 'classic') { showToast("❌ Solde insuffisant !"); return; }
  if (style !== 'classic' && cueStyle === 'classic') { updateBalance(-price); }
  cueStyle = style;
  document.querySelectorAll('.shop-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`cue-${style}`).classList.add('active');
  showToast("🔥 Queue équipée !");
}

function createPocketParticles(x, y, color) {
  for(let i=0; i<12; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      radius: Math.random() * 3 + 1,
      color: color, alpha: 1,
      life: 1
    });
  }
}

class Ball {
  constructor(x, y, color, number, type) {
    this.x = x; this.y = y; this.vx = 0; this.vy = 0;
    this.color = color; this.number = number; this.type = type;
    this.isPocketed = false;
    this.spinX = 0; this.spinY = 0;
    this.pulseTimer = Math.random() * 5; 
  }

  update() {
    if (this.isPocketed) return;

    this.x += this.vx; this.y += this.vy;
    this.vx *= FRICTION; this.vy *= FRICTION;

    if (this.type === "cue") {
      this.vx += this.spinX * 0.05; this.vy += this.spinY * 0.05;
      this.spinX *= 0.95; this.spinY *= 0.95;
    }

    if (Math.abs(this.vx) < 0.03) this.vx = 0;
    if (Math.abs(this.vy) < 0.03) this.vy = 0;

    const minX = TABLE_PADDING + BALL_RADIUS; const maxX = canvas.width - TABLE_PADDING - BALL_RADIUS;
    const minY = TABLE_PADDING + BALL_RADIUS; const maxY = canvas.height - TABLE_PADDING - BALL_RADIUS;

    let bounced = false;
    if (this.x < minX) { this.x = minX; this.vx *= -1; bounced = true; if(this.type === "cue") this.spinY *= -0.8; }
    if (this.x > maxX) { this.x = maxX; this.vx *= -1; bounced = true; if(this.type === "cue") this.spinY *= -0.8; }
    if (this.y < minY) { this.y = minY; this.vy *= -1; bounced = true; if(this.type === "cue") this.spinX *= -0.8; }
    if (this.y > maxY) { this.y = maxY; this.vy *= -1; bounced = true; if(this.type === "cue") this.spinX *= -0.8; }

    if (bounced) {
      let speed = Math.hypot(this.vx, this.vy);
      AudioEngine.playBounce(speed / 7);
    }

    for (let pocket of pockets) {
      let dist = Math.hypot(this.x - pocket.x, this.y - pocket.y);
      if (dist < POCKET_RADIUS - 1) {
        this.isPocketed = true; this.vx = 0; this.vy = 0;
        createPocketParticles(pocket.x, pocket.y, this.color);
        AudioEngine.playPocket();
        onBallPocketed(this); break;
      }
    }
    this.pulseTimer += 0.08;
  }

  draw() {
    if (this.isPocketed) return;

    if (gameState === "aiming" && currentTurn === "player" && tableAssigned) {
      if (this.type === playerGroup || (playerGroup && this.type === "black" && balls.filter(b => !b.isPocketed && b.type === playerGroup).length === 0)) {
        ctx.save(); ctx.beginPath();
        ctx.arc(this.x, this.y, BALL_RADIUS + 5 + Math.sin(this.pulseTimer) * 2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(6, 182, 212, 0.15)"; ctx.fill();
        ctx.strokeStyle = "rgba(6, 182, 212, 0.5)"; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
      }
    }

    ctx.save();
    let shadowGrad = ctx.createRadialGradient(this.x+3, this.y+4, 1, this.x+3, this.y+4, BALL_RADIUS);
    ctx.restore();

    ctx.save();
    let grad = ctx.createRadialGradient(this.x - BALL_RADIUS*0.3, this.y - BALL_RADIUS*0.3, 1, this.x, this.y, BALL_RADIUS);
    grad.addColorStop(0, "#ffffff"); grad.addColorStop(0.2, this.color); grad.addColorStop(1, "#020202");
    ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill(); ctx.restore();

    if (this.type === "striped") {
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, -Math.PI/3, Math.PI/3); ctx.lineTo(this.x, this.y); ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill(); ctx.restore();
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, Math.PI - Math.PI/3, Math.PI + Math.PI/3); ctx.lineTo(this.x, this.y); ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill(); ctx.restore();
    }
    if (this.type !== "cue") {
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS*0.35, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();
      ctx.font = "900 8px Arial"; ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(this.number, this.x, this.y); ctx.restore();
    }
  }
}

function initGame() {
  balls = []; particles = []; playerPocketed = []; oppPocketed = []; tableAssigned = false;
  playerGroup = null; oppGroup = null; hasDeductedBet = false;
  document.getElementById("player-target").innerText = "Table Ouverte";
  document.getElementById("opp-target").innerText = "Table Ouverte";

  currentOpponent = onlineOpponents[Math.floor(Math.random() * onlineOpponents.length)];
  document.getElementById("opp-name-label").innerText = currentOpponent.name;

  cueBall = new Ball(220, 200, "#ffffff", 0, "cue"); balls.push(cueBall);

  let startX = 540; let startY = 200;
  let layout = [
    { n: 1, c: "#fbbf24", t: "solid" },   { n: 9, c: "#fbbf24", t: "striped" },
    { n: 2, c: "#2563eb", t: "solid" },   { n: 8, c: "#111111", t: "black" },
    { n: 10, c: "#2563eb", t: "striped" }, { n: 3, c: "#dc2626", t: "solid" },
    { n: 11, c: "#dc2626", t: "striped" }, { n: 4, c: "#7c3aed", t: "solid" },
    { n: 12, c: "#7c3aed", t: "striped" }, { n: 5, c: "#ea580c", t: "solid" },
    { n: 13, c: "#ea580c", t: "striped" }, { n: 6, c: "#16a34a", t: "solid" },
    { n: 14, c: "#16a34a", t: "striped" }, { n: 7, c: "#9a3412", t: "solid" },
    { n: 15, c: "#9a3412", t: "striped" }
  ];

  let idx = 0;
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j <= i; j++) {
      let x = startX + i * (BALL_RADIUS * 1.74); let y = startY + (j - i / 2) * (BALL_RADIUS * 2.04);
      if(layout[idx]) balls.push(new Ball(x, y, layout[idx].c, layout[idx].n, layout[idx].t));
      idx++;
    }
  }
  renderPocketsUI();
  gameState = "aiming"; currentTurn = "player";
}

function renderPocketsUI() {
  document.getElementById("player-pockets").innerHTML = playerPocketed.map(c => `<div class="pocketed-dot" style="background:${c}"></div>`).join('');
  document.getElementById("opp-pockets").innerHTML = oppPocketed.map(c => `<div class="pocketed-dot" style="background:${c}"></div>`).join('');
}

function onBallPocketed(ball) {
  if (ball.type === "cue") {
    ballsPocketedThisTurn.push("cue");
    setTimeout(() => { ball.isPocketed = false; ball.x = 220; ball.y = 200; ball.vx = 0; ball.vy = 0; }, 1200);
  } else if (ball.type === "black") {
    ballsPocketedThisTurn.push("black");
    let currentGrp = currentTurn === "player" ? playerGroup : oppGroup;
    let rem = balls.filter(b => !b.isPocketed && b.type === currentGrp);
    
    if (rem.length === 0) {
      if(currentTurn === "player") { updateBalance(currentBet * 2); showToast(`🏆 VICTOIRE ! +${currentBet}`); } 
      else { showToast(`❌ DÉFAITE ! L'adversaire a empoché la noire.`); }
    } else {
      if(currentTurn === "player") { showToast("❌ Faute ! La bille noire est entrée prématurément."); } 
      else { updateBalance(currentBet * 2); showToast("🏆 Victoire ! L'adversaire a commis une erreur."); }
    }
    setTimeout(initGame, 3000);
  } else {
    ballsPocketedThisTurn.push(ball);
    if (currentTurn === "player") playerPocketed.push(ball.color); else oppPocketed.push(ball.color);
    renderPocketsUI();
  }
}

function resolveCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      let b1 = balls[i]; let b2 = balls[j];
      if (b1.isPocketed || b2.isPocketed) continue;

      let dx = b2.x - b1.x; let dy = b2.y - b1.y;
      let dist = Math.hypot(dx, dy);

      if (dist < BALL_RADIUS * 2) {
        if (dist === 0) continue;

        if (b1.type === "cue" && !firstBallHitThisTurn) firstBallHitThisTurn = b2;
        if (b2.type === "cue" && !firstBallHitThisTurn) firstBallHitThisTurn = b1;

        let overlap = (BALL_RADIUS * 2) - dist;
        let nx = dx / dist; let ny = dy / dist;
        b1.x -= nx * overlap * 0.5; b1.y -= ny * overlap * 0.5;
        b2.x += nx * overlap * 0.5; b2.y += ny * overlap * 0.5;

        let kx = b1.vx - b2.vx; let ky = b1.vy - b2.vy;
        let p = 2 * (nx * kx + ny * ky) / 2;
        
        b1.vx -= p * nx; b1.vy -= p * ny;
        b2.vx += p * nx; b2.vy += p * ny;

        let strikeSpeed = Math.hypot(b1.vx - b2.vx, b1.vy - b2.vy);
        AudioEngine.playHit(strikeSpeed / 5);
      }
    }
  }
}

function executeOpponentLogic() {
  gameState = "opp_thinking";
  document.getElementById("game-status").innerText = `${currentOpponent.name} réfléchit...`;

  setTimeout(() => {
    let targetGrp = oppGroup || "solid";
    let targets = balls.filter(b => !b.isPocketed && b.type === targetGrp);
    if(targets.length === 0) targets = balls.filter(b => !b.isPocketed && b.type === "black");

    let bestShot = null; let bestScore = -Infinity;
    for (let ball of targets) {
      for (let pocket of pockets) {
        let angleToPocket = Math.atan2(pocket.y - ball.y, pocket.x - ball.x);
        let ghostX = ball.x - Math.cos(angleToPocket) * (BALL_RADIUS * 2);
        let ghostY = ball.y - Math.sin(angleToPocket) * (BALL_RADIUS * 2);
        let angleCue = Math.atan2(ghostY - cueBall.y, ghostX - cueBall.x);
        let dist = Math.hypot(ghostX - cueBall.x, ghostY - cueBall.y);
        let score = 1000 - dist;
        
        if (Math.random() > currentOpponent.skill) {
          angleCue += (Math.random() - 0.5) * 0.12;
        }

        if (score > bestScore) { 
          bestScore = score; 
          bestShot = { angle: angleCue, power: Math.min(14, Math.max(5, dist / 12)) }; 
        }
      }
    }

    if (bestShot) {
      AudioEngine.playHit(bestShot.power / 9);
      cueBall.vx = Math.cos(bestShot.angle) * bestShot.power;
      cueBall.vy = Math.sin(bestShot.angle) * bestShot.power;
      gameState = "moving";
    } else {
      switchTurn();
    }
  }, 1600);
}

function judgeTurnOutcome() {
  let nextTurn = currentTurn; 
  let currentGroup = currentTurn === "player" ? playerGroup : oppGroup;

  if (!tableAssigned && ballsPocketedThisTurn.length > 0 && !ballsPocketedThisTurn.includes("cue")) {
    let firstPocketed = ballsPocketedThisTurn.find(b => b !== "cue" && b !== "black");
    if (firstPocketed) {
      tableAssigned = true;
      if (currentTurn === "player") {
        playerGroup = firstPocketed.type;
        oppGroup = firstPocketed.type === "solid" ? "striped" : "solid";
      } else {
        oppGroup = firstPocketed.type;
        playerGroup = firstPocketed.type === "solid" ? "striped" : "solid";
      }
      document.getElementById("player-target").innerText = playerGroup === "solid" ? "Pleines (ملساء)" : "Rayées (خطوط)";
      document.getElementById("opp-target").innerText = oppGroup === "solid" ? "Pleines (ملساء)" : "Rayées (خطوط)";
      showToast(`🎯 Groupes définis ! Vous jouez les ${playerGroup === "solid" ? "Pleines" : "Rayées"}`);
      nextTurn = currentTurn; 
    }
  } 
  else if (tableAssigned) {
    let hitOwnBallFirst = firstBallHitThisTurn && firstBallHitThisTurn.type === currentGroup;
    let pocketedOwnBall = ballsPocketedThisTurn.some(b => b.type === currentGroup);
    let pocketedOppBall = ballsPocketedThisTurn.some(b => b.type === (currentGroup === "solid" ? "striped" : "solid"));

    if (hitOwnBallFirst && pocketedOwnBall && !pocketedOppBall && !ballsPocketedThisTurn.includes("cue")) {
      showToast("⚡ Bien joué ! Rejouez.");
      nextTurn = currentTurn; 
    } else {
      if (pocketedOppBall) showToast("⚠️ Bille adverse empochée ! Changement de tour.");
      else if (ballsPocketedThisTurn.includes("cue")) showToast("❌ Faute blanche ! Tour adverse.");
      else if (!hitOwnBallFirst) showToast("⚠️ Faute ! Vous devez toucher votre bille en premier.");
      else showToast("Changement de tour.");
      nextTurn = currentTurn === "player" ? "opp" : "player"; 
    }
  } else {
    nextTurn = currentTurn === "player" ? "opp" : "player";
  }

  ballsPocketedThisTurn = []; firstBallHitThisTurn = null; currentTurn = nextTurn;
  document.getElementById("card-player").classList.toggle("active", currentTurn === "player");
  document.getElementById("card-opp").classList.toggle("active", currentTurn === "opp");

  if (currentTurn === "opp") executeOpponentLogic();
  else { gameState = "aiming"; document.getElementById("game-status").innerText = "À votre tour !"; }
}

function switchTurn() {
  if (balls.some(b => b.vx !== 0 || b.vy !== 0)) return;
  judgeTurnOutcome();
}

function drawGuidelines() {
  if (gameState !== "aiming" || currentTurn !== "player") return;
  ctx.save();
  let maxGuideLen = cueStyle === "gold" ? 650 : (cueStyle === "cyber" ? 450 : 200);
  let endX = cueBall.x + Math.cos(aimAngle) * maxGuideLen;
  let endY = cueBall.y + Math.sin(aimAngle) * maxGuideLen;
  let closestBall = null; let closestDist = maxGuideLen;

  for (let ball of balls) {
    if (ball.type === "cue" || ball.isPocketed) continue;
    let A = endY - cueBall.y; let B = cueBall.x - endX; let C = endX * cueBall.y - cueBall.x * endY;
    let distToLine = Math.abs(A * ball.x + B * ball.y + C) / (Math.hypot(A, B) || 1);
    if (distToLine < BALL_RADIUS * 2) {
      let dist = Math.hypot(ball.x - cueBall.x, ball.y - cueBall.y);
      let dot = (ball.x - cueBall.x) * Math.cos(aimAngle) + (ball.y - cueBall.y) * Math.sin(aimAngle);
      if (dot > 0 && dist < closestDist) { closestDist = dist; closestBall = ball; }
    }
  }

  let finalTargetX = cueBall.x + Math.cos(aimAngle) * closestDist;
  let finalTargetY = cueBall.y + Math.sin(aimAngle) * closestDist;

  ctx.beginPath(); ctx.setLineDash([6, 5]);
  ctx.moveTo(cueBall.x, cueBall.y); ctx.lineTo(finalTargetX, finalTargetY);
  ctx.strokeStyle = cueStyle === "cyber" ? "rgba(6, 182, 212, 0.85)" : "rgba(255, 255, 255, 0.45)"; 
  ctx.lineWidth = 1.8; ctx.stroke();

  if (closestBall) {
    ctx.beginPath(); ctx.arc(finalTargetX, finalTargetY, BALL_RADIUS, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.setLineDash([]); ctx.stroke();

    let ballAngle = Math.atan2(closestBall.y - finalTargetY, closestBall.x - finalTargetX);
    ctx.beginPath(); ctx.moveTo(closestBall.x, closestBall.y);
    ctx.lineTo(closestBall.x + Math.cos(ballAngle) * 80, closestBall.y + Math.sin(ballAngle) * 80);
    ctx.strokeStyle = "var(--accent-gold)"; ctx.lineWidth = 2.2; ctx.stroke();
  }

  let cueDist = BALL_RADIUS + 12 + (aimPower * 0.25);
  let cX = cueBall.x - Math.cos(aimAngle) * cueDist; let cY = cueBall.y - Math.sin(aimAngle) * cueDist;
  let eX = cueBall.x - Math.cos(aimAngle) * (cueDist + 200); let eY = cueBall.y - Math.sin(aimAngle) * (cueDist + 200);

  ctx.beginPath();
  if (cueStyle === "gold") { ctx.strokeStyle = "var(--accent-gold)"; ctx.lineWidth = 6.5; } 
  else if (cueStyle === "cyber") { ctx.strokeStyle = "var(--neon-cyan)"; ctx.lineWidth = 5.5; } 
  else { ctx.strokeStyle = "#5c3a21"; ctx.lineWidth = 5.5; }
  ctx.lineCap = "round"; ctx.moveTo(cX, cY); ctx.lineTo(eX, eY); ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for(let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
    if(p.alpha <= 0) { particles.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = p.alpha; ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
  }
}

canvas.addEventListener("mousedown", (e) => { 
  AudioEngine.init(); if (gameState !== "aiming" || currentTurn !== "player") return; 
  isDraggingAim = true; handleAimMove(e); 
});
window.addEventListener("mousemove", (e) => { if (isDraggingAim) handleAimMove(e); });
window.addEventListener("mouseup", () => { if (isDraggingAim) { isDraggingAim = false; launchBall(); } });

canvas.addEventListener("touchstart", (e) => { 
  AudioEngine.init(); if (gameState !== "aiming" || currentTurn !== "player") return; 
  isDraggingAim = true; handleAimMove(e.touches[0]); 
}, {passive:true});
window.addEventListener("touchmove", (e) => { if (isDraggingAim) handleAimMove(e.touches[0]); }, {passive:true});
window.addEventListener("touchend", () => { if (isDraggingAim) { isDraggingAim = false; launchBall(); } });

function handleAimMove(e) {
  let r = canvas.getBoundingClientRect();
  let x = (e.clientX - r.left) * (canvas.width / r.width);
  let y = (e.clientY - r.top) * (canvas.height / r.height);
  aimAngle = Math.atan2(y - cueBall.y, x - cueBall.x);
  let d = Math.hypot(x - cueBall.x, y - cueBall.y);
  aimPower = Math.min(100, Math.max(5, d * 0.5));

  let fillH = (aimPower / 100) * 340;
  let powerFillEl = document.getElementById("power-fill");
  if(powerFillEl) {
    powerFillEl.setAttribute("y", 340 - fillH);
    powerFillEl.setAttribute("height", fillH);
  }
}

function launchBall() {
  if (aimPower < 8) return;

  if (!hasDeductedBet) {
    if (userSolde < currentBet) {
      showToast("❌ رصيدك غير كافٍ لخوض هذه المباراة !");
      aimPower = 0; return;
    }
    hasDeductedBet = true; updateBalance(-currentBet);
  }

  AudioEngine.playHit(aimPower / 100);
  cueBall.vx = Math.cos(aimAngle) * (aimPower * 0.17); cueBall.vy = Math.sin(aimAngle) * (aimPower * 0.17);
  cueBall.spinX = spinX * 3.8; cueBall.spinY = spinY * 3.8;
  gameState = "moving";
}

const pad = document.getElementById("spin-pad");
const marker = document.getElementById("spin-marker");
function updateSpin(e) {
  let r = pad.getBoundingClientRect();
  let cx = r.left + r.width/2; let cy = r.top + r.height/2;
  let dx = e.clientX - cx; let dy = e.clientY - cy;
  let dist = Math.hypot(dx, dy); let maxR = r.width / 2 - 10;
  if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
  marker.style.left = `calc(50% + ${dx}px)`; marker.style.top = `calc(50% + ${dy}px)`;
  spinX = dx / maxR; spinY = dy / maxR;
}
pad.addEventListener("mousedown", (e) => {
  AudioEngine.init(); let move = (ev) => updateSpin(ev);
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", () => window.removeEventListener("mousemove", move), {once:true});
});

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(TABLE_PADDING, TABLE_PADDING, canvas.width-(TABLE_PADDING*2), canvas.height-(TABLE_PADDING*2));

  ctx.fillStyle = "#020307";
  for(let p of pockets) { 
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_RADIUS + 2, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_RADIUS - 1, 0, Math.PI*2); ctx.fillStyle = "#04060f"; ctx.fill();
  }

  ctx.save(); ctx.beginPath(); ctx.arc(220, 200, 1.5, 0, Math.PI*2); ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fill(); ctx.restore();

  let anyMoving = false;
  for (let ball of balls) {
    if(!ball.isPocketed) {
      ctx.save(); ctx.beginPath(); ctx.arc(ball.x+3, ball.y+4, BALL_RADIUS, 0, Math.PI*2); ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fill(); ctx.restore();
    }
    ball.update(); ball.draw();
    if(Math.abs(ball.vx) > 0 || Math.abs(ball.vy) > 0) anyMoving = true;
  }

  resolveCollisions(); drawGuidelines(); drawParticles();
  if(gameState === "moving" && !anyMoving) switchTurn();
  requestAnimationFrame(loop);
}

initGame(); loop();
</script>
