<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>Pro 8-Ball Tournament Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
:root {
  --bg-dark: #030611;
  --panel-bg: rgba(6, 10, 26, 0.96);
  --accent-gold: #fbbf24;
  --neon-cyan: #06b6d4;
  --neon-emerald: #10b981;
  --table-green: #011f16;
  --wood-border: #3b2314;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

body {
  background-color: var(--bg-dark);
  background-image: radial-gradient(circle at 50% 20%, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
  color: #f8fafc; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 10px; overflow: hidden;
}

.main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1400px; align-items: flex-start; justify-content: center; flex-wrap: wrap; }
.game-container { flex: 1; min-width: 320px; max-width: 960px; display: flex; flex-direction: column; gap: 12px; }

.side-panel {
  width: 330px; background: var(--panel-bg); border: 2px solid rgba(6, 182, 212, 0.25);
  border-radius: 24px; padding: 20px; box-shadow: 0 0 40px rgba(6, 182, 212, 0.1); backdrop-filter: blur(25px);
  display: flex; flex-direction: column; gap: 20px;
}

.panel-title { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; text-align: center; }

.leaderboard-list { display: flex; flex-direction: column; gap: 6px; }
.leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; font-size: 13px; }
.leaderboard-item.player-row { background: linear-gradient(90deg, rgba(6, 182, 212, 0.15), transparent); border-left: 4px solid var(--neon-cyan); font-weight: 900; }

.economy-bar {
  width: 100%; background: var(--panel-bg); padding: 12px 20px; border-radius: 20px;
  display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(6, 182, 212, 0.2);
}
.solde-txt { font-weight: 900; color: var(--neon-emerald); font-size: 18px; font-family: 'Orbitron', sans-serif; }

.scoreboard {
  width: 100%; background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.03);
  padding: 12px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
}
.player-card { display: flex; flex-direction: column; gap: 4px; align-items: center; min-width: 140px; transition: all 0.3s ease; opacity: 0.6; }
.player-card.active { opacity: 1; transform: scale(1.03); }
.player-name { font-size: 15px; font-weight: 900; color: #94a3b8; }
.player-card.active .player-name { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
.player-card.opp.active .player-name { color: var(--accent-gold); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }

.pocketed-balls-display { display: flex; gap: 4px; min-height: 14px; }
.pocketed-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.8); }

.arena-container { display: flex; width: 100%; gap: 12px; align-items: center; }
.power-slider-container { width: 35px; height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; background: #050814; border-radius: 12px; border: 1px solid #1e293b; padding: 10px 0; }

.table-wrapper { position: relative; flex: 1; background: var(--wood-border); padding: 16px; border-radius: 24px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); border: 4px solid #23140b; }
#billiards-canvas { display: block; width: 100%; background: var(--table-green); border-radius: 8px; cursor: crosshair; touch-action: none; }

.spin-selector-container { display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
.spin-pad { width: 85px; height: 85px; background: #ffffff; border-radius: 50%; position: relative; border: 4px solid #475569; cursor: pointer; }
.spin-marker { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }

.shop-buttons { display: flex; flex-direction: column; gap: 8px; }
.shop-btn { background: #070b14; border: 1px solid #1e293b; color: #fff; padding: 12px; border-radius: 12px; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.shop-btn.active { border-color: var(--neon-emerald); background: rgba(16, 185, 129, 0.08); }

.status-msg { font-size: 13px; font-weight: 700; color: #475569; text-align: center; min-height: 20px; }
#toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; }
.toast { background: #060a17; border: 2px solid var(--neon-cyan); color: #fff; padding: 12px 35px; border-radius: 14px; font-size: 13px; font-weight: 900; box-shadow: 0 0 25px rgba(6, 182, 212, 0.4); }

.bet-display-txt { font-weight: 900; color: var(--accent-gold); font-size: 16px; font-family: 'Orbitron', sans-serif; }
</style>
</head>
<body>

<div id="toast-container"></div>

<div class="main-wrapper">
  <div class="game-container">
    <div class="economy-bar">
      <div id="solde-display" class="solde-txt">SOLDE: 0 DH</div>
      <div id="bet-display" class="bet-display-txt">BET: 0 DH</div>
    </div>

    <div class="scoreboard">
      <div id="player-card-home" class="player-card active">
        <span class="player-name">Vous</span>
        <span class="text-xs text-slate-400">Table Ouverte</span>
        <div class="pocketed-balls-display" id="home-pockets"></div>
      </div>
      <div class="text-center font-black italic text-cyan-400 text-xl font-mono">VS</div>
      <div id="player-card-away" class="player-card opp">
        <span class="player-name">Lucas 🇫🇷</span>
        <span class="text-xs text-slate-400">Table Ouverte</span>
        <div class="pocketed-balls-display" id="away-pockets"></div>
      </div>
    </div>

    <div class="arena-container">
      <div class="power-slider-container">
        <span class="text-[9px] font-black text-red-500 font-mono tracking-widest">MAX</span>
        <input type="range" id="power-slider" min="1" max="40" value="20" step="0.5" style="transform: rotate(-90deg); width: 280px; background: transparent; cursor: pointer;">
        <span class="text-[9px] font-black text-emerald-500 font-mono tracking-widest">MIN</span>
      </div>

      <div class="table-wrapper">
        <canvas id="billiards-canvas"></canvas>
      </div>
    </div>
    
    <div id="game-status" class="status-msg">Initialisation de la partie...</div>
  </div>

  <div class="side-panel">
    <h3 class="panel-title">Contrôles &amp; Effets</h3>
    
    <div class="spin-selector-container">
      <span class="text-[11px] font-bold text-slate-400">Effet de la Blanche</span>
      <div id="spin-pad" class="spin-pad">
        <div id="spin-marker" class="spin-marker"></div>
      </div>
    </div>

    <h3 class="panel-title">Actions Simulation</h3>
    <div class="shop-buttons">
      <button onclick="simulateMatchEnd(true)" class="shop-btn active" style="border-color: var(--neon-emerald);">
         Simuler Victoire (+Double الرهان)
      </button>
      <button onclick="simulateMatchEnd(false)" class="shop-btn" style="border-color: #ef4444;">
         Simuler Défaite (خصم الرهان)
      </button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB86n79oAqZ1rNWtezWxZ-f0ngV2QJn1fw",
  authDomain: "poolcash-6692c.firebaseapp.com",
  databaseURL: "https://poolcash-6692c-default-rtdb.firebaseio.com",
  projectId: "poolcash-6692c",
  storageBucket: "poolcash-6692c.firebasestorage.app",
  messagingSenderId: "866544389541",
  appId: "1:866544389541:web:2382c85a768da8c5bd6c4c"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let currentUsername = "Ayoube";
let globalUserBalance = 0;
let currentBetAmount = 0;

function initUserSession() {
  let activeUser = localStorage.getItem('username') || localStorage.getItem('user');
  if (activeUser) {
    currentUsername = activeUser.trim();
    if (currentUsername.includes('@')) {
      currentUsername = currentUsername.split('@')[0];
    }
  }
  
  // جلب قيمة الرهان المخزن المعلق
  const pendingBet = localStorage.getItem('pendingBet');
  if (pendingBet) {
      currentBetAmount = parseFloat(pendingBet) || 0;
      document.getElementById('bet-display').innerText = `BET: ${currentBetAmount} DH`;
  }

  startFirebaseSync(currentUsername);
}

function startFirebaseSync(username) {
  if (!username) return;
  const userRef = database.ref('users/' + username);
  
  userRef.on('value', (snapshot) => {
    const userData = snapshot.val();
    if (userData) {
      globalUserBalance = userData.balance !== undefined ? parseFloat(userData.balance) : 0;
      document.getElementById('solde-display').innerText = `SOLDE: ${globalUserBalance} DH`;
    }
  });
}

function simulateMatchEnd(isWin) {
    if (currentBetAmount <= 0) {
        showToast("Aucun pari actif trouvé !");
        return;
    }

    let finalBalance = globalUserBalance;
    if (isWin) {
        // عند الربح: يتضاعف الرهان (إرجاع قيمة الرهان + أرباح تساوي قيمة الرهان)
        finalBalance = globalUserBalance + (currentBetAmount * 2);
        showToast(`Gagné ! +${currentBetAmount * 2} DH ajouté au solde`);
    } else {
        // عند الخسارة: تم السحب مسبقاً عند الدخول، وبالتالي لا يتم إضافة شيء
        showToast(`Perdu ! ${currentBetAmount} DH retiré de votre compte`);
    }

    database.ref('users/' + currentUsername).update({
        balance: finalBalance
    }).then(() => {
        // بعد انتهاء المباراة نقوم بتصفير الرهان الحالي في الكود والـ localStorage
        currentBetAmount = 0;
        localStorage.removeItem('pendingBet');
        document.getElementById('bet-display').innerText = `BET: 0 DH`;
    });
}

function showToast(msg) {
  const container = document.getElementById('toast-container');
  if(!container) return;
  container.innerHTML = `<div class="toast">${msg}</div>`;
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// Canvas & Graphics logic loop structure logic safely maintained
const canvas = document.getElementById('billiards-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const p = canvas.parentElement;
  canvas.width = p.clientWidth;
  canvas.height = p.clientWidth * 0.5;
}

window.addEventListener('resize', resizeCanvas);
document.addEventListener("DOMContentLoaded", () => {
  resizeCanvas();
  initUserSession();
  document.getElementById('game-status').innerText = "Prêt à jouer !";
  
  // Drawing loop base mockup setup
  setInterval(() => {
     ctx.clearRect(0,0,canvas.width,canvas.height);
     ctx.fillStyle = '#01291d';
     ctx.fillRect(0, 0, canvas.width, canvas.height);
     // Base cue ball visualization circle placeholder
     ctx.beginPath();
     ctx.fillStyle = '#ffffff';
     ctx.arc(canvas.width * 0.25, canvas.height * 0.5, 8, 0, Math.PI*2);
     ctx.fill();
     ctx.closePath();
  }, 1000/30);
});
</script>
</body>
</html>
