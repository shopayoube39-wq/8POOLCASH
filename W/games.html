function spawnShockwaveParticles(x, y, color, amt=20) {
  for(let i=0; i<amt; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      radius: Math.random() * 3 + 1,
      color: color, alpha: 1,
      decay: Math.random() * 0.04 + 0.02
    });
  }
}

class Ball {
  constructor(x, y, color, num, type) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.color = color; this.num = num; this.type = type; this.isPocketed = false; this.pulse = Math.random()*5; }
  update() {
    if (this.isPocketed) return;
    this.x += this.vx; this.y += this.vy; this.vx *= FRICTION; this.vy *= FRICTION;
    
    // محاكاة فيزيائية لانحراف ودوران الكرة البيضاء الناتجة عن الـ Spin
    if (this.type === "cue") { 
      this.vx += spinX * 0.05; this.vy += spinY * 0.05; 
      spinX *= 0.94; spinY *= 0.94; 
    }
    if (Math.abs(this.vx) < 0.015) this.vx = 0; if (Math.abs(this.vy) < 0.015) this.vy = 0;

    const minX = TABLE_PADDING + BALL_RADIUS; const maxX = canvas.width - TABLE_PADDING - BALL_RADIUS;
    const minY = TABLE_PADDING + BALL_RADIUS; const maxY = canvas.height - TABLE_PADDING - BALL_RADIUS;
    let hitWall = false;
    if (this.x < minX) { this.x = minX; this.vx *= -0.96; hitWall = true; }
    if (this.x > maxX) { this.x = maxX; this.vx *= -0.96; hitWall = true; }
    if (this.y < minY) { this.y = minY; this.vy *= -0.96; hitWall = true; }
    if (this.y > maxY) { this.y = maxY; this.vy *= -0.96; hitWall = true; }
    
    if (hitWall) { 
      SpatialAudio.wallBounce(this.x, Math.hypot(this.vx, this.vy)); 
      spawnShockwaveParticles(this.x, this.y, "#ffffff", 6); 
    }

    for (let p of pockets) {
      if (Math.hypot(this.x - p.x, this.y - p.y) < POCKET_RADIUS - 1) {
        this.isPocketed = true; this.vx = 0; this.vy = 0;
        spawnShockwaveParticles(p.x, p.y, this.color, 25); 
        SpatialAudio.pocketIn();
        handleScoreProcessing(this); break;
      }
    }
    this.pulse += 0.08;
  }
  draw() {
    if (this.isPocketed) return;
    
    // رسم ظلال ديناميكية واقعية أسفل الكرات للإيحاء بالعمق ثلاثي الأبعاد
    ctx.save(); 
    ctx.beginPath(); 
    ctx.arc(this.x + 4, this.y + 4, BALL_RADIUS, 0, Math.PI * 2); 
    ctx.fillStyle = "rgba(0,0,0,0.4)"; 
    ctx.fill(); 
    ctx.restore();

    if (gameState === "aiming" && currentTurn === "player" && tableAssigned) {
      if (this.type === playerGroup || (playerGroup && this.type === "black" && balls.filter(b => !b.isPocketed && b.type === playerGroup).length === 0)) {
        ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS + 6, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 255, 135, 0.05)"; ctx.strokeStyle = "var(--neon-emerald)"; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
      }
    }

    if (this.type === "cue" && isBallInHand && currentTurn === "player") {
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS + 7 + Math.sin(this.pulse)*2.5, 0, Math.PI * 2);
      ctx.strokeStyle = "var(--neon-cyan)"; ctx.lineWidth = 2.5; ctx.stroke(); ctx.restore();
    }

    ctx.save();
    let grad = ctx.createRadialGradient(this.x - BALL_RADIUS*0.35, this.y - BALL_RADIUS*0.35, 1, this.x, this.y, BALL_RADIUS);
    grad.addColorStop(0, "#ffffff"); grad.addColorStop(0.3, this.color); grad.addColorStop(1, "#000000");
    ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill(); ctx.restore();

    if (this.type === "striped") {
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, -Math.PI/3, Math.PI/3); ctx.lineTo(this.x, this.y); ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.fill(); ctx.restore();
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, Math.PI - Math.PI/3, Math.PI + Math.PI/3); ctx.lineTo(this.x, this.y); ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.fill(); ctx.restore();
    }
    if (this.type !== "cue") {
      ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS*0.38, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();
      ctx.font = "900 9px Arial"; ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(this.num, this.x, this.y); ctx.restore();
    }
  }
}

function buildArena() {
  balls = []; particles = []; playerPocketed = []; oppPocketed = []; tableAssigned = false; playerGroup = null; oppGroup = null; hasDeductedBet = false; isBallInHand = false;
  document.getElementById("p-target").innerText = Dictionary[currentLang].open; document.getElementById("p-target").className = "u-group";
  document.getElementById("o-target").innerText = Dictionary[currentLang].open; document.getElementById("o-target").className = "u-group";
  
  activeOpponent = dynamicOpponents[Math.floor(Math.random() * dynamicOpponents.length)];
  document.getElementById("opp-name-lbl").innerText = activeOpponent.name;
  document.getElementById("opp-avatar").innerText = activeOpponent.avatar;

  cueBall = new Ball(220, 200, "#ffffff", 0, "cue"); balls.push(cueBall);
  let startX = 540; let startY = 200;
  let layout = [
    { n: 1, c: "#ffcc00", t: "solid" }, { n: 9, c: "#ffcc00", t: "striped" },
    { n: 2, c: "#0066ff", t: "solid" }, { n: 8, c: "#111111", t: "black" },
    { n: 10, c: "#0066ff", t: "striped" }, { n: 3, c: "#ff3333", t: "solid" },
    { n: 11, c: "#ff3333", t: "striped" }, { n: 4, c: "#9933ff", t: "solid" },
    { n: 12, c: "#9933ff", t: "striped" }, { n: 5, c: "#ff6600", t: "solid" },
    { n: 13, c: "#ff6600", t: "striped" }, { n: 6, c: "#00cc44", t: "solid" },
    { n: 14, c: "#00cc44", t: "striped" }, { n: 7, c: "#994d00", t: "solid" }, { n: 15, c: "#994d00", t: "striped" }
  ];
  let idx = 0;
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j <= i; j++) {
      let x = startX + i * (BALL_RADIUS * 1.76); let y = startY + (j - i / 2) * (BALL_RADIUS * 2.05);
      if(layout[idx]) balls.push(new Ball(x, y, layout[idx].c, layout[idx].n, layout[idx].t));
      idx++;
    }
  }
  refreshPocketsDisplay(); gameState = "aiming"; currentTurn = "player"; updateStatusUI();
}

function refreshPocketsDisplay() {
  document.getElementById("p-pockets").innerHTML = playerPocketed.map(c => `<div class="pocket-dot" style="background:${c}"></div>`).join('');
  document.getElementById("o-pockets").innerHTML = oppPocketed.map(c => `<div class="pocket-dot" style="background:${c}"></div>`).join('');

function handleScoreProcessing(ball) {
  if (ball.type === "cue") {
    ballsPocketedThisTurn.push("cue");
    isBallInHand = true; 
    setTimeout(() => { ball.isPocketed = false; ball.x = 220; ball.y = 200; ball.vx = 0; ball.vy = 0; }, 1000);
  } else if (ball.type === "black") {
    ballsPocketedThisTurn.push("black");
    let currentGrp = currentTurn === "player" ? playerGroup : oppGroup;
    if (balls.filter(b => !b.isPocketed && b.type === currentGrp).length === 0) {
      if(currentTurn === "player") { commitBalanceUpdate(currentBet * 2); triggerToast(Dictionary[currentLang].win); }
      else { triggerToast(Dictionary[currentLang].lose); }
    } else {
      if(currentTurn === "player") triggerToast(Dictionary[currentLang].foul);
      else { commitBalanceUpdate(currentBet * 2); triggerToast(Dictionary[currentLang].win); }
    }
    setTimeout(buildArena, 2500);
  } else {
    ballsPocketedThisTurn.push(ball);
    if (currentTurn === "player") playerPocketed.push(ball.color); else oppPocketed.push(ball.color);
    refreshPocketsDisplay();
  }
}

function computeCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      let b1 = balls[i]; let b2 = balls[j];
      if (b1.isPocketed || b2.isPocketed) continue;
      let dx = b2.x - b1.x; let dy = b2.y - b1.y; let dist = Math.hypot(dx, dy);
      if (dist < BALL_RADIUS * 2) {
        if (b1.type === "cue" && !firstBallHitThisTurn) firstBallHitThisTurn = b2;
        if (b2.type === "cue" && !firstBallHitThisTurn) firstBallHitThisTurn = b1;
        let overlap = (BALL_RADIUS * 2) - dist; let nx = dx / dist; let ny = dy / dist;
        b1.x -= nx * overlap * 0.51; b1.y -= ny * overlap * 0.51; b2.x += nx * overlap * 0.51; b2.y += ny * overlap * 0.51;
        let kx = b1.vx - b2.vx; let ky = b1.vy - b2.vy; let p = 2 * (nx * kx + ny * ky) / 2;
        if (p > 0) {
          b1.vx -= p * nx; b1.vy -= p * ny; b2.vx += p * nx; b2.vy += p * ny;
          let force = Math.hypot(b1.vx - b2.vx, b1.vy - b2.vy);
          
          // تشغيل صوت اصطدام الكرات الديناميكي المجسم ستيريو
          SpatialAudio.ballHit(b1.x, force);
          if(force > 1.2) spawnShockwaveParticles((b1.x+b2.x)/2, (b1.y+b2.y)/2, "#ffbb00", 8);
        }
      }
    }
  }
}

function runOpponentAI() {
  gameState = "opp_thinking"; updateStatusUI();
  setTimeout(() => {
    let targetGrp = oppGroup || "solid"; let targets = balls.filter(b => !b.isPocketed && b.type === targetGrp);
    if(targets.length === 0) targets = balls.filter(b => !b.isPocketed && b.type === "black");
    let bestShot = null; let bestScore = -Infinity;
    for (let ball of targets) {
      for (let pocket of pockets) {
        let angleToPocket = Math.atan2(pocket.y - ball.y, pocket.x - ball.x);
        let ghostX = ball.x - Math.cos(angleToPocket) * (BALL_RADIUS * 2); let ghostY = ball.y - Math.sin(angleToPocket) * (BALL_RADIUS * 2);
        let angleCue = Math.atan2(ghostY - cueBall.y, ghostX - cueBall.x); let dist = Math.hypot(ghostX - cueBall.x, ghostY - cueBall.y);
        let score = 1000 - dist;
        if (Math.random() > activeOpponent.skill) angleCue += (Math.random() - 0.5) * 0.04;
        if (score > bestScore) { bestScore = score; bestShot = { angle: angleCue, power: Math.min(14, Math.max(5, dist / 11)) }; }
      }
    }
    if (bestShot) {
      aimAngle = bestShot.angle; let targetPower = bestShot.power * 6;
      let step = () => {
        if(aimPower < targetPower) { aimPower += 4; updateSliderUI(); requestAnimationFrame(step); }
        else { cueBall.vx = Math.cos(bestShot.angle) * bestShot.power; cueBall.vy = Math.sin(bestShot.angle) * bestShot.power; gameState = "moving"; }
      };
      step();
    } else { finalizeTurn(); }
  }, 1200);
}

function finalizeTurn() {
  let nextTurn = currentTurn; let currentGroup = currentTurn === "player" ? playerGroup : oppGroup;
  
  if (ballsPocketedThisTurn.includes("cue")) {
    isBallInHand = true;
    nextTurn = currentTurn === "player" ? "opp" : "player";
    triggerToast(Dictionary[currentLang].ballInHand);
  } else if (!tableAssigned && ballsPocketedThisTurn.length > 0) {
    let f = ballsPocketedThisTurn.find(b => b !== "black");
    if (f) {
      tableAssigned = true;
      if (currentTurn === "player") { playerGroup = f.type; oppGroup = f.type === "solid" ? "striped" : "solid"; }
      else { oppGroup = f.type; playerGroup = f.type === "solid" ? "striped" : "solid"; }
      
      document.getElementById("p-target").innerText = Dictionary[currentLang][playerGroup];
      document.getElementById("p-target").className = `u-group ${playerGroup}`;
      document.getElementById("o-target").innerText = Dictionary[currentLang][oppGroup];
      document.getElementById("o-target").className = `u-group ${oppGroup}`;
    }
  } else if (tableAssigned) {
    let hitOwn = firstBallHitThisTurn && firstBallHitThisTurn.type === currentGroup;
    let pocketedOwn = ballsPocketedThisTurn.some(b => b.type === currentGroup);
    if (hitOwn && pocketedOwn) {} else { nextTurn = currentTurn === "player" ? "opp" : "player"; }
  } else {
    nextTurn = currentTurn === "player" ? "opp" : "player";
  }

  ballsPocketedThisTurn = []; firstBallHitThisTurn = null; currentTurn = nextTurn;
  
  let hull = document.getElementById("radar-hull");
  if(currentTurn === "player") { hull.className = "versus-radar player-active"; isBallInHand = false; } 
  else { hull.className = "versus-radar opp-active"; }

  aimPower = 15; updateSliderUI();
  if (currentTurn === "opp") runOpponentAI();
  else { gameState = "aiming"; updateStatusUI(); }
}

function renderLaserGuides() {
  if (gameState !== "aiming" || isBallInHand) return;
  ctx.save();
  let maxLen = cueStyle === "gold" ? 780 : (cueStyle === "cyber" ? 540 : 250);
  let endX = cueBall.x + Math.cos(aimAngle) * maxLen; let endY = cueBall.y + Math.sin(aimAngle) * maxLen;
  let targetBall = null; let tDist = maxLen;

  for (let ball of balls) {
    if (ball.type === "cue" || ball.isPocketed) continue;
    let A = endY - cueBall.y; let B = cueBall.x - endX; let C = endX * cueBall.y - cueBall.x * endY;
    let d = Math.abs(A * ball.x + B * ball.y + C) / (Math.hypot(A, B) || 1);
    if (d < BALL_RADIUS * 2) {
      let dist = Math.hypot(ball.x - cueBall.x, ball.y - cueBall.y);
      let dot = (ball.x - cueBall.x) * Math.cos(aimAngle) + (ball.y - cueBall.y) * Math.sin(aimAngle);
      if (dot > 0 && dist < tDist) { tDist = dist; targetBall = ball; }
    }
  }
  let fx = cueBall.x + Math.cos(aimAngle) * tDist; let fy = cueBall.y + Math.sin(aimAngle) * tDist;
  ctx.beginPath(); ctx.setLineDash([6, 4]); ctx.moveTo(cueBall.x, cueBall.y); ctx.lineTo(fx, fy);
  ctx.strokeStyle = cueStyle === "cyber" ? "rgba(0, 243, 255, 0.95)" : (cueStyle === "gold" ? "rgba(255,183,0,0.85)" : "rgba(255, 255, 255, 0.45)");
  ctx.lineWidth = 2; ctx.stroke();

  if (targetBall) {
    ctx.beginPath(); ctx.arc(fx, fy, BALL_RADIUS, 0, Math.PI*2); ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.setLineDash([]); ctx.stroke();
    let bAngle = Math.atan2(targetBall.y - fy, targetBall.x - fx);
    ctx.beginPath(); ctx.moveTo(targetBall.x, targetBall.y); ctx.lineTo(targetBall.x + Math.cos(bAngle)*80, targetBall.y + Math.sin(bAngle)*80);
    ctx.strokeStyle = "var(--neon-gold)"; ctx.lineWidth = 2; ctx.stroke();
  }

  let cueDist = BALL_RADIUS + 14 + (aimPower * 0.35);
  ctx.beginPath(); ctx.strokeStyle = cueStyle === "gold" ? "var(--neon-gold)" : (cueStyle === "cyber" ? "var(--neon-cyan)" : "#42220d");
  ctx.lineWidth = 5.5; ctx.lineCap = "round";
  ctx.moveTo(cueBall.x - Math.cos(aimAngle)*cueDist, cueBall.y - Math.sin(aimAngle)*cueDist);
  ctx.lineTo(cueBall.x - Math.cos(aimAngle)*(cueDist+170), cueBall.y - Math.sin(aimAngle)*(cueDist+170));
  ctx.stroke(); ctx.restore();
}

function drawFXParticles() {
  for(let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
    if(p.alpha <= 0) { particles.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = p.alpha; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
  }
}

function handleAimInput(clientX, clientY) { 
  let r = canvas.getBoundingClientRect(); 
  let mx = (clientX - r.left)*(canvas.width/r.width);
  let my = (clientY - r.top)*(canvas.height/r.height);
  
  if (isBallInHand && currentTurn === "player") {
    if (mx > TABLE_PADDING + BALL_RADIUS && mx < 260 && my > TABLE_PADDING + BALL_RADIUS && my < canvas.height - TABLE_PADDING - BALL_RADIUS) {
      cueBall.x = mx; cueBall.y = my;
    }
  } else { aimAngle = Math.atan2(my - cueBall.y, mx - cueBall.x); }
}

function fireCueBall() {
  if (aimPower < 6 || isBallInHand) return;
  if (!hasDeductedBet) { if (VaultSecure.unlock() < currentBet) { triggerToast(Dictionary[currentLang].insf); return; } hasDeductedBet = true; commitBalanceUpdate(-currentBet); }
  SpatialAudio.ballHit(cueBall.x, aimPower / 12); cueBall.vx = Math.cos(aimAngle) * (aimPower * 0.16); cueBall.vy = Math.sin(aimAngle) * (aimPower * 0.16); gameState = "moving";
}

const disc = document.getElementById("spin-board"); const dot = document.getElementById("spin-dot");
disc.addEventListener("mousedown", () => {
  SpatialAudio.init();
  let move = (ev) => {
    let r = disc.getBoundingClientRect(); let dx = ev.clientX - (r.left + r.width/2); let dy = ev.clientY - (r.top + r.height/2); let dist = Math.hypot(dx, dy); let maxR = r.width/2 - 10;
    if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
    dot.style.left = `calc(50% + ${dx}px)`; dot.style.top = `calc(50% + ${dy}px)`; spinX = dx/maxR; spinY = dy/maxR;
  };
  window.addEventListener("mousemove", move); window.addEventListener("mouseup", () => window.removeEventListener("mousemove", move), {once:true});
});

function coreRenderLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(TABLE_PADDING, TABLE_PADDING, canvas.width-(TABLE_PADDING*2), canvas.height-(TABLE_PADDING*2));
  ctx.fillStyle = "#010103"; for(let p of pockets) { ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI*2); ctx.fill(); }
  let moving = false; for (let ball of balls) { ball.update(); ball.draw(); if(Math.abs(ball.vx) > 0 || Math.abs(ball.vy) > 0) moving = true; }
  computeCollisions(); renderLaserGuides(); drawFXParticles();
  if(gameState === "moving" && !moving) finalizeTurn();
  requestAnimationFrame(coreRenderLoop);
}
buildArena(); coreRenderLoop();
</script>
